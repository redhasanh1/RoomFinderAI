<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Negotiator - RoomFinderAI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="./ai-chat.js?v=8"></script>
    <script src="./ai-negotiation.js?v=1"></script>
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            min-height: 100vh;
        }
        
        .gradient-text {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .chat-container {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }
        
        #chatMessages {
            height: 600px;
            overflow-y: auto;
            padding: 2rem;
            background: linear-gradient(135deg, #f8fafc 0%, #ffffff 100%);
        }
        
        .chat-input {
            background: white;
            border: 2px solid #e5e7eb;
            border-radius: 15px;
            padding: 1rem 1.5rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }
        
        .chat-input:focus {
            border-color: #667eea;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.2);
            outline: none;
        }
        
        .modern-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 15px;
            padding: 1rem 2rem;
            color: white;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        
        .modern-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.6);
        }
        
        .typing-indicator {
            color: #6b7280;
            font-style: italic;
            background: #f3f4f6;
            padding: 0.75rem 1rem;
            border-radius: 15px;
            animation: pulse 1.5s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body class="flex flex-col min-h-screen">
    <header class="bg-white/95 backdrop-blur-lg shadow-lg sticky top-0 z-10">
        <nav class="w-[80%] mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-6">
                <div class="text-2xl font-bold gradient-text">RoomFinderAI</div>
                <a href="/index" class="text-gray-700 hover:text-blue-600 transition">Home</a>
                <a href="/listings" class="text-gray-700 hover:text-blue-600 transition">Listings</a>
                <a href="/pricing" class="text-gray-700 hover:text-blue-600 transition">Pricing</a>
            </div>
            <div id="authSection">
                <a href="/login" class="text-gray-700 hover:text-blue-600 transition">Login/Register</a>
            </div>
        </nav>
    </header>

    <main class="flex-grow w-[80%] mx-auto px-4 py-12">
        <section class="chat-container p-6 mb-12">
            <h2 class="text-4xl font-bold gradient-text mb-6 text-center">AI Negotiator</h2>
            <p class="text-lg text-gray-600 mb-6 text-center">Chat with our AI to find rentals and negotiate with landlords automatically!</p>
            
            <div class="border border-gray-200 rounded-2xl shadow-lg">
                <div class="bg-gradient-to-r from-blue-500 to-purple-600 text-white p-4 rounded-t-2xl">
                    <h3 class="text-lg font-semibold">AI Negotiator Assistant</h3>
                </div>
                
                <div id="chatMessages" class="border-b border-gray-200">
                    <p class="text-gray-600">Hello! I'm here to help you find rentals and negotiate with landlords.</p>
                </div>
                
                <div class="p-4">
                    <input id="chatInput" type="text" class="chat-input w-full" 
                           placeholder="Type your message... (e.g., 'I want a house in Paris under $1200')" 
                           onkeypress="if(event.key==='Enter') sendMessage()">
                    <div class="flex gap-2 mt-4">
                        <button id="sendButton" onclick="sendMessage()" class="flex-1 modern-button">
                            Send Message
                        </button>
                        <button onclick="checkForUpdates()" class="px-4 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600 transition-colors" title="Check for new AI responses">
                            🔄 Refresh
                        </button>
                        <button onclick="testAPIConnectivity()" class="px-4 py-2 bg-green-500 text-white rounded-lg hover:bg-green-600 transition-colors" title="Test API connections">
                            🧪 Test
                        </button>
                        <button onclick="clearChat()" class="px-4 py-2 bg-gray-500 text-white rounded-lg hover:bg-gray-600 transition-colors" title="Clear chat history">
                            🗑️ Clear
                        </button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="bg-gray-800 text-white py-8">
        <div class="w-[80%] mx-auto px-4 text-center">
            <p class="text-sm">© 2025 RoomFinderAI. All rights reserved.</p>
        </div>
    </footer>

    <script>
        // Global variables
        let aiNegotiator;
        let aiNegotiationEngine;
        let currentUser;

        // Initialize the application
        document.addEventListener('DOMContentLoaded', async () => {
            console.log('🚀 Initializing AI Negotiator...');
            
            // Check authentication
            currentUser = JSON.parse(localStorage.getItem('currentUser'));
            if (!currentUser) {
                window.location.href = '/login';
                return;
            }

            // Update auth section
            const authSection = document.getElementById('authSection');
            authSection.innerHTML = `
                <a href="/profile">
                    <img src="${currentUser.profileImage || 'data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNDAiIGhlaWdodD0iNDAiIHZpZXdCb3g9IjAgMCA0MCA0MCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48Y2lyY2xlIGN4PSIyMCIgY3k9IjIwIiByPSIyMCIgZmlsbD0iIzY2NzJhMCIvPjx0ZXh0IHg9IjUwJSIgeT0iNTAlIiBmb250LWZhbWlseT0iQXJpYWwiIGZvbnQtc2l6ZT0iMTQiIGZpbGw9IndoaXRlIiB0ZXh0LWFuY2hvcj0ibWlkZGxlIiBkeT0iLjNlbSI+VTwvdGV4dD48L3N2Zz4='}" 
                         alt="Profile" class="w-10 h-10 rounded-full">
                </a>
            `;

            // Load configuration from Railway API first, fallback to config.js
            let configData;
            try {
                const response = await fetch('/api/config');
                if (response.ok) {
                    const config = await response.json();
                    configData = {
                        OPENAI_API_KEY: config.OPENAI_API_KEY,
                        OPENAI_ORG_ID: config.OPENAI_ORG_ID,
                        OPENAI_MODEL: config.OPENAI_MODEL || 'gpt-3.5-turbo',
                        SUPABASE_URL: config.SUPABASE_URL,
                        SUPABASE_ANON_KEY: config.SUPABASE_ANON_KEY
                    };
                    console.log('✅ Using Railway API configuration');
                } else {
                    throw new Error('Railway API failed');
                }
            } catch (error) {
                console.log('⚠️ Railway API failed, using fallback config');
                configData = {
                    OPENAI_API_KEY: window.config?.OPENAI_API_KEY || config?.OPENAI_API_KEY,
                    OPENAI_ORG_ID: window.config?.OPENAI_ORG_ID || config?.OPENAI_ORG_ID,
                    OPENAI_MODEL: window.config?.OPENAI_MODEL || config?.OPENAI_MODEL || 'gpt-3.5-turbo',
                    SUPABASE_URL: window.config?.SUPABASE_URL || config?.SUPABASE_URL,
                    SUPABASE_ANON_KEY: window.config?.SUPABASE_ANON_KEY || config?.SUPABASE_ANON_KEY
                };
            }

            // Initialize Supabase
            const supabase = window.supabase.createClient(configData.SUPABASE_URL, configData.SUPABASE_ANON_KEY);

            // Check if AIChatHandler class is available
            if (typeof AIChatHandler === 'undefined') {
                console.error('❌ AIChatHandler class not found! ai-chat.js not loaded properly');
                alert('Error: AI Chat module not loaded. Please refresh the page.');
                return;
            }

            // Initialize AI Negotiator
            console.log('🔧 Creating AIChatHandler instance...');
            aiNegotiator = new AIChatHandler(supabase, configData);
            aiNegotiator.init(currentUser);

            // Initialize AI Negotiation Engine
            console.log('🔧 Creating AINegotiationEngine instance...');
            if (typeof AINegotiationEngine !== 'undefined') {
                aiNegotiationEngine = new AINegotiationEngine(supabase, configData);
                aiNegotiator.setNegotiationEngine(aiNegotiationEngine);
                console.log('✅ AI Negotiation Engine initialized');
            } else {
                console.warn('⚠️ AINegotiationEngine class not found - negotiation features disabled');
            }

            // Add a small delay to ensure everything is loaded
            setTimeout(() => {
                console.log('🚀 Starting real-time systems...');
                
                // Set up real-time listeners for AI negotiator interface
                setupRealTimeNegotiationListener();
                
                // Set up automatic polling as backup
                setupAutomaticPolling();
                
                // Request notification permission for better UX
                requestNotificationPermission();
                
                console.log('✅ Real-time systems started');
            }, 1000);

            console.log('✅ AI Negotiator initialized successfully');
        });

        // Send message function
        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            
            if (!message) return;
            
            console.log('💬 Sending message:', message);
            
            try {
                await aiNegotiator.processMessage(message);
                input.value = '';
            } catch (error) {
                console.error('Error processing message:', error);
                aiNegotiator.appendMessage('AI', 'Sorry, there was an error processing your message.', 'left');
            }
        }

        // Clear chat function
        function clearChat() {
            if (confirm('Are you sure you want to clear the chat history?')) {
                if (aiNegotiator) {
                    aiNegotiator.clearConversationHistory();
                    // Show welcome message
                    aiNegotiator.appendMessage('AI', 'Hello! I\'m your AI Negotiator. Tell me what you\'re looking for (e.g., "I need a 2-bedroom apartment under $1500 in Toronto") and I\'ll find matching listings and negotiate with landlords for you automatically using market data!', 'left');
                }
            }
        }

        // Test direct message updates
        function testDirectUpdate() {
            if (aiNegotiator) {
                aiNegotiator.appendMessage('AI', '🧪 **Test Update**: Direct message system working!', 'left');
                aiNegotiator.celebrateSuccess();
                console.log('✅ Direct update test successful');
            } else {
                console.error('❌ AI Negotiator not initialized');
            }
        }

        // Test message handling
        function testMessageHandling() {
            if (aiNegotiationEngine) {
                console.log('🧪 Testing message handling...');
                aiNegotiationEngine.testMessageHandling('sure');
            } else {
                console.error('❌ AI Negotiation Engine not initialized');
            }
        }

        // Test negotiation flow
        function testNegotiationFlow() {
            if (aiNegotiationEngine) {
                aiNegotiationEngine.testNegotiationFlow();
            } else {
                console.error('❌ AI Negotiation Engine not initialized');
            }
        }

        // Check recent messages
        function checkRecentMessages() {
            if (aiNegotiationEngine) {
                aiNegotiationEngine.checkRecentMessages();
            } else {
                console.error('❌ AI Negotiation Engine not initialized');
            }
        }

        // Set up real-time negotiation listener for instant updates
        function setupRealTimeNegotiationListener() {
            if (!supabase || !currentUser?.email) {
                console.warn('⚠️ Cannot setup real-time listener - missing supabase or user');
                return;
            }

            console.log('🔔 Setting up real-time negotiation listener for instant updates');

            // Listen for new messages from AI negotiator
            const messageChannel = supabase
                .channel(`ai_negotiator_realtime_${Date.now()}`)
                .on('postgres_changes', {
                    event: 'INSERT',
                    schema: 'public',
                    table: 'messages'
                }, async (payload) => {
                    const newMessage = payload.new;
                    console.log('🔔 [REAL-TIME] New message detected:', newMessage);
                    
                    // Check if this is from AI negotiator
                    if (newMessage.sender_email === 'ai-negotiator@roomfinder.com') {
                        console.log('🤖 AI Negotiator message detected!');
                        
                        // Get conversation details to find user
                        const { data: conversation } = await supabase
                            .from('conversations')
                            .select('sender_email, receiver_email')
                            .eq('id', newMessage.conversation_id)
                            .single();
                        
                        // Check if this conversation involves current user
                        if (conversation && 
                            (conversation.sender_email === currentUser.email || 
                             conversation.receiver_email === currentUser.email)) {
                            
                            console.log('🎯 Message is for current user - displaying immediately');
                            
                            // Extract clean content
                            const cleanContent = newMessage.content.replace(/^🤖 AI Negotiator.*?:\s*/s, '');
                            
                            // Check if this looks like a success message
                            if (cleanContent.includes('🎉') && cleanContent.includes('Excellent')) {
                                aiNegotiator.appendMessage('AI', '🎉 **NEGOTIATION SUCCESS!**', 'left');
                                aiNegotiator.appendMessage('AI', cleanContent, 'left');
                                aiNegotiator.celebrateSuccess();
                                
                                // Show notification
                                if ('Notification' in window && Notification.permission === 'granted') {
                                    new Notification('🎉 Negotiation Success!', {
                                        body: 'Your rental negotiation was successful!',
                                        icon: 'data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNDAiIGhlaWdodD0iNDAiIHZpZXdCb3g9IjAgMCA0MCA0MCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48Y2lyY2xlIGN4PSIyMCIgY3k9IjIwIiByPSIyMCIgZmlsbD0iIzRmNzMzYSIvPjx0ZXh0IHg9IjUwJSIgeT0iNTAlIiBmb250LWZhbWlseT0iQXJpYWwiIGZvbnQtc2l6ZT0iMTQiIGZpbGw9IndoaXRlIiB0ZXh0LWFuY2hvcj0ibWlkZGxlIiBkeT0iLjNlbSI+🎉</text></svg>'
                                    });
                                }
                            } else {
                                // Regular AI response
                                aiNegotiator.appendMessage('AI', `🤖 **AI Update:** ${cleanContent}`, 'left');
                            }
                        }
                    }
                })
                .subscribe((status, err) => {
                    console.log('🔔 Real-time message listener status:', status);
                    if (err) {
                        console.error('❌ Real-time message listener error:', err);
                    }
                    if (status === 'SUBSCRIBED') {
                        console.log('✅ Real-time message listener active');
                    }
                });

            // Store reference for cleanup
            window.realtimeMessageChannel = messageChannel;
        }

        // Set up automatic polling as backup
        function setupAutomaticPolling() {
            console.log('⏰ Setting up aggressive automatic polling every 3 seconds');
            console.log('📊 Current user email:', currentUser?.email);
            console.log('📊 Document hidden:', document.hidden);
            
            // Track what we've already shown to avoid duplicates
            // Start with a time from 1 minute ago so we catch recent activity
            let lastProcessedBackupTime = Date.now() - (60 * 1000); // 1 minute ago
            console.log('📊 Starting lastProcessedBackupTime:', new Date(lastProcessedBackupTime));
            
            // Check for updates every 3 seconds automatically (much more aggressive)
            const pollingInterval = setInterval(async () => {
                console.log('⏰ Auto-polling tick - Document hidden:', document.hidden, 'User email:', currentUser?.email);
                
                if (!document.hidden && currentUser?.email) { // Only poll when page is visible
                    console.log('⏰ Auto-polling for updates...');
                    
                    try {
                        // Check localStorage backups for recent activity
                        const backups = JSON.parse(localStorage.getItem('ai_negotiation_backups') || '[]');
                        console.log('📦 Total backups found:', backups.length);
                        
                        const newBackups = backups.filter(backup => {
                            const backupTime = new Date(backup.timestamp).getTime();
                            const isForCurrentUser = backup.userEmail === currentUser?.email;
                            const isNew = backupTime > lastProcessedBackupTime;
                            
                            console.log('📦 Backup check:', {
                                timestamp: backup.timestamp,
                                userEmail: backup.userEmail,
                                currentUser: currentUser?.email,
                                isForCurrentUser,
                                isNew,
                                backupTime,
                                lastProcessedBackupTime
                            });
                            
                            return isNew && isForCurrentUser;
                        });
                        
                        console.log('🆕 New backups found:', newBackups.length);
                        
                        if (newBackups.length > 0) {
                            console.log('⚡ FOUND NEW NEGOTIATION ACTIVITY!', newBackups);
                            
                            for (const backup of newBackups) {
                                console.log('🎯 Processing backup:', backup);
                                
                                if (backup.landlordReply) {
                                    aiNegotiator.appendMessage('AI', `💬 **Landlord:** "${backup.landlordReply}"`, 'left');
                                }
                                if (backup.aiResponse) {
                                    aiNegotiator.appendMessage('AI', `🤖 **AI Response:** "${backup.aiResponse}"`, 'left');
                                }
                                aiNegotiator.appendMessage('AI', backup.message, 'left');
                                if (backup.type === 'negotiation_success') {
                                    aiNegotiator.celebrateSuccess();
                                    
                                    // Show browser notification
                                    if ('Notification' in window && Notification.permission === 'granted') {
                                        new Notification('🎉 Negotiation Success!', {
                                            body: 'Your rental negotiation was successful!',
                                            icon: 'data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNDAiIGhlaWdodD0iNDAiIHZpZXdCb3g9IjAgMCA0MCA0MCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48Y2lyY2xlIGN4PSIyMCIgY3k9IjIwIiByPSIyMCIgZmlsbD0iIzRmNzMzYSIvPjx0ZXh0IHg9IjUwJSIgeT0iNTAlIiBmb250LWZhbWlseT0iQXJpYWwiIGZvbnQtc2l6ZT0iMTQiIGZpbGw9IndoaXRlIiB0ZXh0LWFuY2hvcj0ibWlkZGxlIiBkeT0iLjNlbSI+🎉</text></svg>'
                                        });
                                    }
                                }
                                
                                // Update last processed time
                                const newTime = new Date(backup.timestamp).getTime();
                                lastProcessedBackupTime = Math.max(lastProcessedBackupTime, newTime);
                                console.log('📊 Updated lastProcessedBackupTime to:', new Date(lastProcessedBackupTime));
                            }
                        }
                    } catch (error) {
                        console.error('Auto-polling error:', error);
                    }
                } else {
                    console.log('⏸️ Skipping auto-poll - document hidden or no user');
                }
            }, 3000); // Every 3 seconds (much more responsive!)

            // Store reference for cleanup
            window.autoPollingInterval = pollingInterval;
            console.log('✅ Auto-polling interval started with ID:', pollingInterval);
        }

        // Request notification permission
        function requestNotificationPermission() {
            if ('Notification' in window && Notification.permission === 'default') {
                Notification.requestPermission().then(permission => {
                    console.log('Notification permission:', permission);
                });
            }
        }

        // Test function to verify auto-polling is working
        function testAutoPolling() {
            console.log('🧪 Testing auto-polling status...');
            console.log('📊 Auto-polling interval ID:', window.autoPollingInterval);
            console.log('📊 Current user:', currentUser);
            console.log('📊 Document hidden:', document.hidden);
            
            // Check localStorage backups
            const backups = JSON.parse(localStorage.getItem('ai_negotiation_backups') || '[]');
            console.log('📦 Backups in localStorage:', backups);
            
            // Manually trigger the polling logic
            if (window.autoPollingInterval) {
                console.log('✅ Auto-polling is set up');
            } else {
                console.log('❌ Auto-polling is NOT set up - restarting...');
                setupAutomaticPolling();
            }
        }

        // Force start auto-polling manually
        function forceStartAutoPolling() {
            console.log('🔧 Force starting auto-polling...');
            if (window.autoPollingInterval) {
                clearInterval(window.autoPollingInterval);
            }
            setupAutomaticPolling();
        }

        // Test API connectivity
        async function testAPIConnectivity() {
            const testResults = [];
            
            try {
                // Test config API
                console.log('🧪 Testing /api/config...');
                const configResponse = await fetch('/api/config');
                const config = await configResponse.json();
                testResults.push(`✅ Config API: OK (${configResponse.status})`);
                testResults.push(`  - OpenAI Key: ${config.OPENAI_API_KEY ? '✅ Present' : '❌ Missing'}`);
                testResults.push(`  - Supabase URL: ${config.SUPABASE_URL ? '✅ Present' : '❌ Missing'}`);
                
                // Test Supabase connection
                if (supabase) {
                    console.log('🧪 Testing Supabase connection...');
                    const { data, error } = await supabase.from('users').select('count').limit(1);
                    if (error) {
                        testResults.push(`❌ Supabase: ${error.message}`);
                    } else {
                        testResults.push(`✅ Supabase: Connected`);
                    }
                } else {
                    testResults.push('❌ Supabase: Not initialized');
                }
                
                // Test OpenAI (if available)
                if (config.OPENAI_API_KEY && aiNegotiationEngine) {
                    console.log('🧪 Testing OpenAI API...');
                    try {
                        // This would be a real test in production
                        testResults.push('✅ OpenAI: Configuration present');
                    } catch (err) {
                        testResults.push(`❌ OpenAI: ${err.message}`);
                    }
                }
                
            } catch (error) {
                testResults.push(`❌ API Test Failed: ${error.message}`);
            }
            
            // Display results
            if (aiNegotiator) {
                aiNegotiator.appendMessage('AI', '🧪 **API Connectivity Test Results:**\n' + testResults.join('\n'), 'left');
            } else {
                console.log('Test Results:', testResults);
                alert('Test Results:\n' + testResults.join('\n'));
            }
        }

        // Manual check for updates
        async function checkForUpdates() {
            if (!aiNegotiator) {
                console.error('❌ AI Negotiator not initialized');
                // Show error in chat area
                const chatMessages = document.getElementById('chatMessages');
                chatMessages.innerHTML += `
                    <div style="color: red; padding: 0.5rem; margin: 0.5rem 0; border-left: 3px solid red;">
                        ❌ AI Negotiator not initialized. Please refresh the page.
                    </div>
                `;
                return;
            }
            
            console.log('🔄 Manually checking for updates...');
            aiNegotiator.appendMessage('AI', '🔄 Checking for new updates (last 5 minutes)...', 'left', true);
            
            try {
                // Check for recent AI chat notifications - extended time window
                const fiveMinutesAgo = new Date(Date.now() - 5 * 60 * 1000).toISOString(); // Last 5 minutes
                
                const { data: recentChats, error } = await aiNegotiator.supabase
                    .from('ai_chats')
                    .select('*')
                    .eq('user_email', currentUser?.email)
                    .gte('created_at', fiveMinutesAgo)
                    .order('created_at', { ascending: false });
                
                aiNegotiator.removeTypingIndicator();
                
                if (error) {
                    console.error('Error checking for updates:', error);
                    aiNegotiator.appendMessage('AI', `❌ Error checking for updates: ${error.message}`, 'left');
                    
                    // Fallback: Check recent messages table for AI responses
                    console.log('🔄 Trying fallback check for recent messages...');
                    try {
                        const { data: recentMessages, error: msgError } = await aiNegotiator.supabase
                            .from('messages')
                            .select('*')
                            .eq('sender_email', 'ai-negotiator@roomfinder.com')
                            .gte('created_at', fiveMinutesAgo)
                            .order('created_at', { ascending: false })
                            .limit(5);
                        
                        if (!msgError && recentMessages?.length > 0) {
                            aiNegotiator.appendMessage('AI', `📨 Found ${recentMessages.length} recent AI message(s):`, 'left');
                            for (const msg of recentMessages) {
                                aiNegotiator.appendMessage('AI', `💬 AI Response: "${msg.content}"`, 'left');
                            }
                        } else {
                            aiNegotiator.appendMessage('AI', '❌ No updates found in fallback check either', 'left');
                        }
                    } catch (fallbackError) {
                        console.error('Fallback check failed:', fallbackError);
                        aiNegotiator.appendMessage('AI', '❌ All update checks failed', 'left');
                    }
                    return;
                }
                
                if (recentChats && recentChats.length > 0) {
                    console.log(`Found ${recentChats.length} recent updates`);
                    aiNegotiator.appendMessage('AI', `✅ Found ${recentChats.length} recent update(s):`, 'left');
                    
                    for (const chat of recentChats) {
                        console.log('Processing update:', chat.title, chat.conversation_data);
                        if (chat.title && chat.title.includes('Negotiation Success')) {
                            aiNegotiator.displayNegotiationSuccess(chat);
                        } else if (chat.title && chat.title.includes('Landlord Reply')) {
                            aiNegotiator.displayLandlordReply(chat);
                        } else {
                            aiNegotiator.displayLandlordReply(chat);
                        }
                    }
                } else {
                    aiNegotiator.appendMessage('AI', '📭 No new updates found in last 5 minutes', 'left');
                    
                    // Check localStorage backups first
                    console.log('🔍 Checking localStorage backups...');
                    try {
                        const backups = JSON.parse(localStorage.getItem('ai_negotiation_backups') || '[]');
                        const recentBackups = backups.filter(backup => 
                            new Date(backup.timestamp) > new Date(Date.now() - 5 * 60 * 1000) &&
                            backup.userEmail === currentUser?.email
                        );
                        
                        if (recentBackups.length > 0) {
                            aiNegotiator.appendMessage('AI', `💾 Found ${recentBackups.length} backup notification(s):`, 'left');
                            for (const backup of recentBackups) {
                                if (backup.landlordReply) {
                                    aiNegotiator.appendMessage('AI', `💬 **Landlord:** "${backup.landlordReply}"`, 'left');
                                }
                                if (backup.aiResponse) {
                                    aiNegotiator.appendMessage('AI', `🤖 **AI Response:** "${backup.aiResponse}"`, 'left');
                                }
                                aiNegotiator.appendMessage('AI', backup.message, 'left');
                                if (backup.type === 'negotiation_success') {
                                    aiNegotiator.celebrateSuccess();
                                }
                            }
                            return; // Found backups, don't check messages table
                        }
                    } catch (backupError) {
                        console.error('Error checking backups:', backupError);
                    }
                    
                    // Also check for any AI messages in the messages table
                    console.log('🔍 Checking messages table for recent AI activity...');
                    try {
                        const { data: aiMessages, error: aiMsgError } = await aiNegotiator.supabase
                            .from('messages')
                            .select('*')
                            .eq('sender_email', 'ai-negotiator@roomfinder.com')
                            .gte('created_at', fiveMinutesAgo)
                            .order('created_at', { ascending: false })
                            .limit(3);
                        
                        if (!aiMsgError && aiMessages?.length > 0) {
                            aiNegotiator.appendMessage('AI', `🤖 Found ${aiMessages.length} recent AI message(s) in conversations:`, 'left');
                            for (const msg of aiMessages) {
                                // Extract the actual message content (remove the AI prefix)
                                const cleanContent = msg.content.replace(/^🤖 AI Negotiator.*?:\s*/s, '');
                                aiNegotiator.appendMessage('AI', cleanContent, 'left');
                            }
                        } else {
                            aiNegotiator.appendMessage('AI', 'ℹ️ No recent AI activity found', 'left');
                        }
                    } catch (msgCheckError) {
                        console.error('Error checking messages:', msgCheckError);
                    }
                }
                
            } catch (error) {
                console.error('Error in manual update check:', error);
                aiNegotiator.removeTypingIndicator();
                aiNegotiator.appendMessage('AI', `❌ Error checking for updates: ${error.message}`, 'left');
            }
        }

        // Global functions for onclick
        window.sendMessage = sendMessage;
        window.clearChat = clearChat;
        window.testDirectUpdate = testDirectUpdate;
        window.testMessageHandling = testMessageHandling;
        window.testNegotiationFlow = testNegotiationFlow;
        window.checkRecentMessages = checkRecentMessages;
        window.checkForUpdates = checkForUpdates;
        window.testAutoPolling = testAutoPolling;
        window.forceStartAutoPolling = forceStartAutoPolling;
        window.testAPIConnectivity = testAPIConnectivity;
    </script>
</body>
</html>
