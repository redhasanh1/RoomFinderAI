<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment - Room Finder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://js.stripe.com/v3/"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        .StripeElement {
            background-color: white;
            height: 40px;
            padding: 10px 12px;
            border-radius: 6px;
            border: 1px solid #d1d5db;
            box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.1);
            transition: border-color 0.15s ease;
        }
        .StripeElement--focus {
            border-color: #3b82f6;
            box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.1), 0 0 0 2px rgba(59, 130, 246, 0.1);
        }
        .StripeElement--invalid {
            border-color: #ef4444;
        }
        .StripeElement--webkit-autofill {
            background-color: #fefefe !important;
        }
    </style>
</head>
<body class="bg-blue-50 flex flex-col min-h-screen">
    <!-- Header -->
    <header class="sticky top-0 bg-white shadow-md z-10">
        <nav class="w-[80%] mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-6">
                <div class="text-2xl font-bold text-blue-600">Room Finder</div>
                <a href="/index" class="text-gray-700 hover:text-blue-600 transition font-medium">Home</a>
                <a href="/index#about" class="text-gray-700 hover:text-blue-600 transition font-medium">About</a>
                <a href="/sublease" class="text-gray-700 hover:text-blue-600 transition font-medium">Sublease</a>
                <a href="/ai-negotiator" class="text-gray-700 hover:text-blue-600 transition font-medium">AI Negotiator</a>
                <a href="/listings" class="text-gray-700 hover:text-blue-600 transition font-medium">Listings</a>
                <a href="/pricing" class="text-gray-700 hover:text-blue-600 transition font-medium">Pricing</a>
                <a href="/index#contact" class="text-gray-700 hover:text-blue-600 transition font-medium">Contact Us</a>
            </div>
            <div id="authSection">
                <a href="/login" class="text-gray-700 hover:text-blue-600 transition font-medium login-link">Login</a>
            </div>
        </nav>
    </header>

    <!-- Payment Section -->
    <main class="flex-grow w-[80%] mx-auto px-4 sm:px-6 lg:px-8 py-12">
        <div class="max-w-md mx-auto bg-white rounded-xl shadow-xl p-8">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-gray-800 mb-4">Complete Your Subscription</h1>
                <div id="planDetails" class="bg-blue-50 p-4 rounded-lg">
                    <p class="text-lg font-semibold text-blue-800" id="planName">Loading...</p>
                    <p class="text-2xl font-bold text-blue-600" id="planPrice">$0.00/mo</p>
                </div>
            </div>

            <!-- Payment Form -->
            <form id="payment-form">
                <div class="mb-6">
                    <label for="email" class="block text-sm font-medium text-gray-700 mb-2">Email Address</label>
                    <input type="email" id="email" required class="w-full p-3 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 transition" placeholder="your.email@example.com">
                </div>

                <div class="mb-6">
                    <label for="name" class="block text-sm font-medium text-gray-700 mb-2">Cardholder Name</label>
                    <input type="text" id="name" required class="w-full p-3 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 transition" placeholder="John Doe">
                </div>

                <div class="mb-6">
                    <label for="card-element" class="block text-sm font-medium text-gray-700 mb-2">Card Information</label>
                    <div id="card-element" class="StripeElement">
                        <!-- Stripe Elements will create form elements here -->
                    </div>
                    <div id="card-errors" role="alert" class="text-red-600 text-sm mt-2"></div>
                </div>

                <div class="mb-6">
                    <div class="flex items-center">
                        <input type="checkbox" id="terms" required class="h-4 w-4 text-blue-600 focus:ring-blue-500 border-gray-300 rounded">
                        <label for="terms" class="ml-2 block text-sm text-gray-900">
                            I agree to the <a href="#" class="text-blue-600 hover:underline">Terms of Service</a> and <a href="#" class="text-blue-600 hover:underline">Privacy Policy</a>
                        </label>
                    </div>
                </div>

                <button type="submit" id="submit-payment" class="w-full bg-blue-600 text-white py-3 px-6 rounded-lg hover:bg-blue-700 transition font-semibold shadow-md hover:shadow-lg disabled:bg-gray-400 disabled:cursor-not-allowed">
                    <span id="button-text">Subscribe Now</span>
                    <div id="spinner" class="hidden inline-block w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin ml-2"></div>
                </button>
            </form>


            <!-- Security Notice -->
            <div class="mt-6 text-center">
                <p class="text-xs text-gray-500">
                    🔒 Your payment information is secured by 256-bit SSL encryption
                </p>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-gray-800 text-white py-8">
        <div class="w-[80%] mx-auto px-4 sm:px-6 lg:px-8 text-center">
            <p class="text-sm">© 2025 Room Finder. All rights reserved.</p>
            <div class="mt-4 flex justify-center space-x-4">
                <a href="/index" class="hover:text-blue-400">Home</a>
                <a href="/index#about" class="hover:text-blue-400">About</a>
                <a href="/sublease" class="hover:text-blue-400">Sublease</a>
                <a href="/ai-negotiator" class="hover:text-blue-400">AI Negotiator</a>
                <a href="/listings" class="hover:text-blue-400">Listings</a>
                <a href="/pricing" class="hover:text-blue-400">Pricing</a>
                <a href="#contact" class="hover:text-blue-400">Contact</a>
            </div>
        </div>
    <script>
        // Initialize Stripe (Publishable key)
        // Stripe publishable key
        const elements = stripe.elements({
            loader: 'auto'
        });

        // Create card element
        const cardElement = elements.create('card', {
            hidePostalCode: true,
            disableLink: true,
            style: {
                base: {
                    fontSize: '16px',
                    color: '#424770',
                    '::placeholder': {
                        color: '#aab7c4',
                    },
                },
                invalid: {
                    color: '#9e2146',
                },
            },
        });

        cardElement.mount('#card-element');

        // Handle real-time validation errors from the card Element
        cardElement.on('change', ({error}) => {
            const displayError = document.getElementById('card-errors');
            if (error) {
                displayError.textContent = error.message;
            } else {
                displayError.textContent = '';
            }
        });

        // Get plan details from URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const plan = urlParams.get('plan') || 'basic';
        const price = urlParams.get('price') || '9.99';

        // Update plan details
        document.getElementById('planName').textContent = plan.charAt(0).toUpperCase() + plan.slice(1) + ' Plan';
        document.getElementById('planPrice').textContent = `$${price}/mo`;

        // Handle form submission
        const form = document.getElementById('payment-form');
        form.addEventListener('submit', async (event) => {
            event.preventDefault();

            const submitButton = document.getElementById('submit-payment');
            const buttonText = document.getElementById('button-text');
            const spinner = document.getElementById('spinner');

            // Disable button and show loading
            submitButton.disabled = true;
            buttonText.textContent = 'Processing...';
            spinner.classList.remove('hidden');

            const {token, error} = await stripe.createToken(cardElement, {
                name: document.getElementById('name').value,
            });

            if (error) {
                // Show error to customer
                const errorElement = document.getElementById('card-errors');
                errorElement.textContent = error.message;

                // Re-enable button
                submitButton.disabled = false;
                buttonText.textContent = 'Subscribe Now';
                spinner.classList.add('hidden');
            } else {
                // Send token to your server
                submitToken(token);
            }
        });

        async function submitToken(token) {
            const email = document.getElementById('email').value;
            const name = document.getElementById('name').value;

            try {
                // Send payment to backend for processing
                const response = await fetch('http://localhost:3000/api/process-payment', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        token: token,
                        email: email,
                        name: name,
                        plan: plan,
                        price: price
                    })
                });

                const result = await response.json();

                if (response.ok && result.success) {
                    // Payment successful
                    console.log('Payment successful:', result.chargeId);
                    
                    // Show success message
                    showSuccessMessage();

                    // Store subscription in localStorage
                    const currentUser = JSON.parse(localStorage.getItem('currentUser')) || {};
                    currentUser.subscription = {
                        plan: plan,
                        price: price,
                        status: 'active',
                        startDate: new Date().toISOString(),
                        paymentMethod: 'card',
                        chargeId: result.chargeId
                    };
                    localStorage.setItem('currentUser', JSON.stringify(currentUser));

                    // Redirect to success page or dashboard
                    setTimeout(() => {
                        window.location.href = '/index?payment=success';
                    }, 3000);

                } else {
                    // Payment failed
                    throw new Error(result.error || 'Payment processing failed');
                }

            } catch (error) {
                console.error('Payment failed:', error);
                showErrorMessage(error.message || 'Payment failed. Please try again.');
                
                // Re-enable button
                const submitButton = document.getElementById('submit-payment');
                const buttonText = document.getElementById('button-text');
                const spinner = document.getElementById('spinner');
                
                submitButton.disabled = false;
                buttonText.textContent = 'Subscribe Now';
                spinner.classList.add('hidden');
            }
        }

        function showSuccessMessage() {
            const form = document.getElementById('payment-form');
            form.innerHTML = `
                <div class="text-center py-8">
                    <div class="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-green-100 mb-4">
                        <svg class="h-6 w-6 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                        </svg>
                    </div>
                    <h2 class="text-2xl font-bold text-gray-900 mb-2">Payment Successful!</h2>
                    <p class="text-gray-600 mb-4">Welcome to Room Finder ${plan.charAt(0).toUpperCase() + plan.slice(1)}!</p>
                    <p class="text-sm text-gray-500">Redirecting you to the dashboard...</p>
                </div>
            `;
        }

        function showErrorMessage(message) {
            const errorElement = document.getElementById('card-errors');
            errorElement.textContent = message;
        }

        // Update authentication section and check login status
        document.addEventListener('DOMContentLoaded', () => {
            const currentUser = JSON.parse(localStorage.getItem('currentUser'));
            const authSection = document.getElementById('authSection');

            if (currentUser) {
                authSection.innerHTML = `
                    <a href="/profile">
                        <img src="${currentUser.profileImage || 'https://via.placeholder.com/40'}" alt="Profile" class="w-10 h-10 rounded-full">
                    </a>
                `;
                
                // Pre-fill email if user is logged in
                if (currentUser.email) {
                    document.getElementById('email').value = currentUser.email;
                }
            } else {
                // User is not logged in - show error message and disable form
                showLoginRequiredError();
            }
        });

        function showLoginRequiredError() {
            const form = document.getElementById('payment-form');
            form.innerHTML = `
                <div class="text-center py-8">
                    <div class="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-red-100 mb-4">
                        <svg class="h-6 w-6 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.732-.833-2.5 0L3.732 16.5c-.77.833.192 2.5 1.732 2.5z"></path>
                        </svg>
                    </div>
                    <h2 class="text-2xl font-bold text-gray-900 mb-2">Login Required</h2>
                    <p class="text-gray-600 mb-6">You must be logged in to make a purchase. Please log in to your account before continuing.</p>
                    <a href="/login" class="bg-blue-600 text-white py-3 px-6 rounded-lg hover:bg-blue-700 transition font-semibold shadow-md hover:shadow-lg inline-block">
                        Login Now
                    </a>
                </div>
            `;
        }

        // Note about testing
        console.log(`
        🔧 STRIPE TESTING NOTES:
        
        Test Card Numbers:
        - 4242424242424242 (Visa)
        - 4000000000000002 (Card declined)
        - 4000000000009995 (Insufficient funds)
        
        Use any future date for expiry, any 3-digit CVC, and any ZIP code.
        `);
    </script>
</body>
</html>
