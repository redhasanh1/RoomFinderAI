<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoomFinderAI - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        /* Auth container */
        .auth-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
        }
        
        /* Gradient text */
        .gradient-text {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        /* Modern input styling */
        .modern-input {
            background: white;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            padding: 1rem 1.5rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }
        
        .modern-input:focus {
            border-color: #667eea;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.2);
            outline: none;
        }
        
        /* Modern button */
        .auth-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 12px;
            padding: 1rem 2rem;
            color: white;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        
        .auth-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.6);
        }
        
        .auth-button:disabled {
            background: #9ca3af;
            transform: none;
            box-shadow: none;
            cursor: not-allowed;
        }
        
        /* Toggle button */
        .toggle-button {
            background: transparent;
            border: 2px solid #667eea;
            color: #667eea;
            border-radius: 12px;
            padding: 0.75rem 1.5rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .toggle-button:hover {
            background: #667eea;
            color: white;
            transform: translateY(-1px);
        }
        
        /* Modern header */
        .modern-header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        /* Floating card effect */
        .floating-card {
            animation: float 6s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        
        /* Form animations */
        .form-container {
            transition: all 0.3s ease-in-out;
        }
        
        .form-container button {
            transition: background-color 0.2s ease-in-out, transform 0.2s ease-in-out, box-shadow 0.2s ease-in-out;
        }
        
        /* Error styling */
        .error-input {
            border-color: #ef4444 !important;
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.2) !important;
        }
        
        /* Success styling */
        .success-message {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            padding: 1rem;
            border-radius: 12px;
            animation: slideIn 0.5s ease;
        }
        
        /* Verification code styling */
        .letter-spacing-wide {
            letter-spacing: 0.5rem;
        }
        
        #verificationCode:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        #aiButton {
            transition: transform 0.3s ease-in-out, box-shadow 0.2s ease-in-out;
        }
        #aiButton:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }
    </style>
</head>
<body class="flex flex-col min-h-screen">
    <!-- Header -->
    <header class="sticky top-0 modern-header shadow-lg z-10">
        <nav class="w-[80%] mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-6">
                <div class="text-2xl font-bold gradient-text">RoomFinderAI</div>
                <a href="/index" class="text-gray-700 hover:text-blue-600 transition font-medium">Home</a>
                <a href="/index#about" class="text-gray-700 hover:text-blue-600 transition font-medium">About</a>
                <a href="/sublease" class="text-gray-700 hover:text-blue-600 transition font-medium">Sublease</a>
                <a href="/ai-negotiator" class="text-gray-700 hover:text-blue-600 transition font-medium">AI Negotiator</a>
                <a href="/listings" class="text-gray-700 hover:text-blue-600 transition font-medium">Listings</a>
                <a href="/pricing" class="text-gray-700 hover:text-blue-600 transition font-medium">Pricing</a>
                <a href="/index#contact" class="text-gray-700 hover:text-blue-600 transition font-medium">Contact Us</a>
            </div>
        </nav>
    </header>

    <!-- Main Content -->
    <main class="flex-grow w-[80%] mx-auto px-4 sm:px-6 lg:px-8 py-12">
        <section class="auth-container floating-card p-8 sm:p-10 max-w-lg mx-auto">
            <div id="authFormContainer">
                <h2 id="formTitle" class="text-4xl font-bold gradient-text mb-8 text-center">Welcome Back</h2>
                <form id="authForm" class="space-y-6 form-container">
                <div id="nameFields" class="hidden space-y-6">
                    <div>
                        <label for="firstName" class="block text-sm font-medium text-gray-700">First Name</label>
                        <input type="text" id="firstName" name="firstName" class="modern-input w-full mt-1" placeholder="e.g., John">
                    </div>
                    <div>
                        <label for="lastName" class="block text-sm font-medium text-gray-700">Last Name</label>
                        <input type="text" id="lastName" name="lastName" class="modern-input w-full mt-1" placeholder="e.g., Doe">
                    </div>
                </div>
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700">Email</label>
                    <input type="email" id="email" name="email" required class="modern-input w-full mt-1" placeholder="e.g., john.doe@example.com">
                </div>
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
                    <input type="password" id="password" name="password" required class="modern-input w-full mt-1" placeholder="Enter your password">
                </div>
                <div>
                    <button type="submit" id="submitButton" class="w-full auth-button">Sign In</button>
                </div>
                <div class="text-center">
                    <button type="button" id="toggleForm" class="toggle-button">Don't have an account? Register</button>
                </div>
            </form>
            </div>
            
            <!-- Email Verification Section (hidden by default) -->
            <div id="verificationSection" class="hidden">
                <h2 class="text-3xl font-bold gradient-text mb-6 text-center">Verify Your Email</h2>
                <div class="text-center mb-6">
                    <div class="bg-blue-50 border border-blue-200 rounded-lg p-4 mb-6">
                        <svg class="mx-auto h-12 w-12 text-blue-600 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
                        </svg>
                        <p class="text-gray-700">We've sent a 6-digit verification code to:</p>
                        <p id="verificationEmail" class="font-semibold text-blue-600 mt-1"></p>
                    </div>
                </div>
                
                <form id="verificationForm" class="space-y-6">
                    <div>
                        <label for="verificationCode" class="block text-sm font-medium text-gray-700 text-center mb-2">Enter Verification Code</label>
                        <input type="text" id="verificationCode" name="verificationCode" required 
                               class="modern-input w-full text-center text-2xl font-bold letter-spacing-wide" 
                               placeholder="123456" maxlength="6" pattern="[0-9]{6}">
                        <p class="text-sm text-gray-500 text-center mt-2">Code expires in 10 minutes</p>
                    </div>
                    <div>
                        <button type="submit" id="verifyButton" class="w-full auth-button">Verify Email</button>
                    </div>
                    <div class="text-center">
                        <button type="button" id="resendCode" class="toggle-button">Didn't receive code? Resend</button>
                    </div>
                    <div class="text-center">
                        <button type="button" id="backToRegistration" class="text-sm text-gray-600 hover:text-gray-800">← Back to Registration</button>
                    </div>
                </form>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="bg-gray-800 text-white py-8">
        <div class="w-[80%] mx-auto px-4 sm:px-6 lg:px-8 text-center">
            <p class="text-sm">© 2025 RoomFinderAI. All rights reserved.</p>
            <div class="mt-4 flex justify-center space-x-4">
                <a href="/index" class="hover:text-blue-400">Home</a>
                <a href="/index#about" class="hover:text-blue-400">About</a>
                <a href="/sublease" class="hover:text-blue-400">Sublease</a>
                <a href="/ai-negotiator" class="hover:text-blue-400">AI Negotiator</a>
                <a href="/listings" class="hover:text-blue-400">Listings</a>
                <a href="/index#contact" class="hover:text-blue-400">Contact</a>
            </div>
        </div>
    </footer>


    <script type="text/javascript">
        var gk_isXlsx = false;
        var gk_xlsxFileLookup = {};
        var gk_fileData = {};
        function filledCell(cell) {
            return cell !== '' && cell != null;
        }
        function loadFileData(filename) {
            if (gk_isXlsx && gk_xlsxFileLookup[filename]) {
                try {
                    var workbook = XLSX.read(gk_fileData[filename], { type: 'base64' });
                    var firstSheetName = workbook.SheetNames[0];
                    var worksheet = workbook.Sheets[firstSheetName];
                    var jsonData = XLSX.utils.sheet_to_json(worksheet, { header: 1, blankrows: false, defval: '' });
                    var filteredData = jsonData.filter(row => row.some(filledCell));
                    var headerRowIndex = filteredData.findIndex((row, index) =>
                        row.filter(filledCell).length >= filteredData[index + 1]?.filter(filledCell).length
                    );
                    if (headerRowIndex === -1 || headerRowIndex > 25) {
                        headerRowIndex = 0;
                    }
                    var csv = XLSX.utils.aoa_to_sheet(filteredData.slice(headerRowIndex));
                    csv = XLSX.utils.sheet_to_csv(csv, { header: 1 });
                    return csv;
                } catch (e) {
                    console.error(e);
                    return "";
                }
            }
            return gk_fileData[filename] || "";
        }
    </script>
    <script>
        // We'll use the backend API instead of direct Supabase calls
        // const supabase = window.supabase.createClient(config.SUPABASE_URL, config.SUPABASE_ANON_KEY);

        const form = document.getElementById('authForm');
        const formTitle = document.getElementById('formTitle');
        const submitButton = document.getElementById('submitButton');
        const toggleForm = document.getElementById('toggleForm');
        const nameFields = document.getElementById('nameFields');
        let isLogin = true;

        toggleForm.addEventListener('click', () => {
            isLogin = !isLogin;
            formTitle.textContent = isLogin ? 'Login' : 'Register';
            submitButton.textContent = isLogin ? 'Login' : 'Register';
            toggleForm.textContent = isLogin ? "Don't have an account? Register" : 'Already have an account? Login';
            nameFields.classList.toggle('hidden', isLogin);
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if (isLogin) {
                // Login using secure backend API
                try {
                    const response = await fetch('/api/login', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ email, password })
                    });

                    const result = await response.json();
                    
                    if (response.ok) {
                        // Create user object for localStorage compatibility
                        const user = {
                            firstName: 'User',
                            lastName: 'Name',
                            email: email,
                            profileImage: 'https://via.placeholder.com/40',
                            aiChats: [],
                            listings: []
                        };
                        localStorage.setItem('currentUser', JSON.stringify(user));
                        window.location.href = '/index';
                    } else {
                        alert(result.error || 'Login failed');
                    }
                } catch (error) {
                    console.error('Login error:', error);
                    alert('Login failed. Please try again.');
                }
            } else {
                // Registration using secure backend API
                const firstName = document.getElementById('firstName').value.trim();
                const lastName = document.getElementById('lastName').value.trim();
                if (!firstName || !lastName) {
                    alert('Please fill in all fields.');
                    return;
                }

                try {
                    console.log('Sending registration request...', { firstName, lastName, email });
                    
                    // Disable submit button to prevent double submission
                    submitButton.disabled = true;
                    submitButton.textContent = 'Sending...';
                    
                    // Send verification email instead of direct registration
                    const response = await fetch('/api/send-verification', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ firstName, lastName, email, password })
                    });

                    const result = await response.json();
                    console.log('Registration response:', response.status, result);
                    
                    if (response.ok) {
                        console.log('Registration successful, showing verification section');
                        // Show verification section
                        showVerificationSection(email, { firstName, lastName, email, password });
                    } else {
                        console.error('Registration failed:', result);
                        alert(result.error || 'Failed to send verification email');
                    }
                } catch (error) {
                    console.error('Registration error:', error);
                    alert('Registration failed. Please try again. Error: ' + error.message);
                } finally {
                    // Re-enable submit button
                    submitButton.disabled = false;
                    submitButton.textContent = 'Register';
                }
            }
        });

        // Store user data temporarily for verification
        let pendingUserData = null;

        // Show verification section
        function showVerificationSection(email, userData) {
            console.log('Showing verification section for:', email);
            pendingUserData = userData;
            
            const authFormContainer = document.getElementById('authFormContainer');
            const verificationSection = document.getElementById('verificationSection');
            const verificationEmailElement = document.getElementById('verificationEmail');
            
            console.log('Elements found:', {
                authFormContainer: !!authFormContainer,
                verificationSection: !!verificationSection,
                verificationEmailElement: !!verificationEmailElement
            });
            
            authFormContainer.classList.add('hidden');
            verificationSection.classList.remove('hidden');
            verificationEmailElement.textContent = email;
            
            console.log('Verification section should now be visible');
        }

        // Hide verification section and show registration form
        function hideVerificationSection() {
            document.getElementById('authFormContainer').classList.remove('hidden');
            document.getElementById('verificationSection').classList.add('hidden');
            pendingUserData = null;
        }

        // Handle verification form submission
        document.getElementById('verificationForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if (!pendingUserData) {
                alert('No pending verification. Please try registering again.');
                return;
            }

            const code = document.getElementById('verificationCode').value.trim();
            
            if (!code || code.length !== 6) {
                alert('Please enter a valid 6-digit code.');
                return;
            }

            try {
                const response = await fetch('/api/verify-email', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ 
                        email: pendingUserData.email, 
                        code: code 
                    })
                });

                const result = await response.json();
                
                if (response.ok) {
                    // Create user object for localStorage compatibility
                    const user = {
                        firstName: pendingUserData.firstName,
                        lastName: pendingUserData.lastName,
                        email: pendingUserData.email,
                        profileImage: 'https://via.placeholder.com/40',
                        aiChats: [],
                        listings: [],
                        emailVerified: true
                    };
                    localStorage.setItem('currentUser', JSON.stringify(user));
                    alert('Email verified successfully! Welcome to RoomFinderAI.');
                    window.location.href = '/index';
                } else {
                    alert(result.error || 'Verification failed');
                }
            } catch (error) {
                console.error('Verification error:', error);
                alert('Verification failed. Please try again.');
            }
        });

        // Handle resend code
        document.getElementById('resendCode').addEventListener('click', async () => {
            if (!pendingUserData) {
                alert('No pending verification. Please try registering again.');
                return;
            }

            try {
                const response = await fetch('/api/send-verification', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(pendingUserData)
                });

                const result = await response.json();
                
                if (response.ok) {
                    alert('Verification code resent successfully!');
                    document.getElementById('verificationCode').value = '';
                } else {
                    alert(result.error || 'Failed to resend verification code');
                }
            } catch (error) {
                console.error('Resend error:', error);
                alert('Failed to resend verification code. Please try again.');
            }
        });

        // Handle back to registration
        document.getElementById('backToRegistration').addEventListener('click', () => {
            hideVerificationSection();
        });

        // Auto-format verification code input (numbers only)
        document.getElementById('verificationCode').addEventListener('input', (e) => {
            e.target.value = e.target.value.replace(/[^0-9]/g, '');
        });
    </script>
</body>
</html>
