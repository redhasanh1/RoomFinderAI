<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoomFinderAI - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        /* Auth container */
        .auth-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
        }
        
        /* Gradient text */
        .gradient-text {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        /* Modern input styling */
        .modern-input {
            background: white;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            padding: 1rem 1.5rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }
        
        .modern-input:focus {
            border-color: #667eea;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.2);
            outline: none;
        }
        
        /* Modern button */
        .auth-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 12px;
            padding: 1rem 2rem;
            color: white;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        
        .auth-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.6);
        }
        
        .auth-button:disabled {
            background: #9ca3af;
            transform: none;
            box-shadow: none;
            cursor: not-allowed;
        }
        
        /* Toggle button */
        .toggle-button {
            background: transparent;
            border: 2px solid #667eea;
            color: #667eea;
            border-radius: 12px;
            padding: 0.75rem 1.5rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .toggle-button:hover {
            background: #667eea;
            color: white;
            transform: translateY(-1px);
        }
        
        /* Modern header */
        .modern-header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        /* Floating card effect */
        .floating-card {
            animation: float 6s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        
        /* Form animations */
        .form-container {
            transition: all 0.3s ease-in-out;
        }
        
        .form-container button {
            transition: background-color 0.2s ease-in-out, transform 0.2s ease-in-out, box-shadow 0.2s ease-in-out;
        }
        
        /* Error styling */
        .error-input {
            border-color: #ef4444 !important;
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.2) !important;
        }
        
        /* Success styling */
        .success-message {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            padding: 1rem;
            border-radius: 12px;
            animation: slideIn 0.5s ease;
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        #aiButton {
            transition: transform 0.3s ease-in-out, box-shadow 0.2s ease-in-out;
        }
        #aiButton:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }
    </style>
</head>
<body class="flex flex-col min-h-screen">
    <!-- Header -->
    <header class="sticky top-0 modern-header shadow-lg z-10">
        <nav class="w-[80%] mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-6">
                <div class="text-2xl font-bold gradient-text">RoomFinderAI</div>
                <a href="/index" class="text-gray-700 hover:text-blue-600 transition font-medium">Home</a>
                <a href="/index#about" class="text-gray-700 hover:text-blue-600 transition font-medium">About</a>
                <a href="/sublease" class="text-gray-700 hover:text-blue-600 transition font-medium">Sublease</a>
                <a href="/ai-negotiator" class="text-gray-700 hover:text-blue-600 transition font-medium">AI Negotiator</a>
                <a href="/listings" class="text-gray-700 hover:text-blue-600 transition font-medium">Listings</a>
                <a href="/pricing" class="text-gray-700 hover:text-blue-600 transition font-medium">Pricing</a>
                <a href="/index#contact" class="text-gray-700 hover:text-blue-600 transition font-medium">Contact Us</a>
            </div>
        </nav>
    </header>

    <!-- Main Content -->
    <main class="flex-grow w-[80%] mx-auto px-4 sm:px-6 lg:px-8 py-12">
        <section class="auth-container floating-card p-8 sm:p-10 max-w-lg mx-auto">
            <h2 id="formTitle" class="text-4xl font-bold gradient-text mb-8 text-center">Welcome Back</h2>
            <form id="authForm" class="space-y-6 form-container">
                <div id="nameFields" class="hidden space-y-6">
                    <div>
                        <label for="firstName" class="block text-sm font-medium text-gray-700">First Name</label>
                        <input type="text" id="firstName" name="firstName" class="modern-input w-full mt-1" placeholder="e.g., John">
                    </div>
                    <div>
                        <label for="lastName" class="block text-sm font-medium text-gray-700">Last Name</label>
                        <input type="text" id="lastName" name="lastName" class="modern-input w-full mt-1" placeholder="e.g., Doe">
                    </div>
                </div>
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700">Email</label>
                    <input type="email" id="email" name="email" required class="modern-input w-full mt-1" placeholder="e.g., john.doe@example.com">
                </div>
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
                    <input type="password" id="password" name="password" required class="modern-input w-full mt-1" placeholder="Enter your password">
                </div>
                <div>
                    <button type="submit" id="submitButton" class="w-full auth-button">Sign In</button>
                </div>
                <div class="text-center">
                    <button type="button" id="toggleForm" class="toggle-button">Don't have an account? Register</button>
                </div>
            </form>
        </section>
    </main>

    <!-- Footer -->
    <footer class="bg-gray-800 text-white py-8">
        <div class="w-[80%] mx-auto px-4 sm:px-6 lg:px-8 text-center">
            <p class="text-sm">© 2025 RoomFinderAI. All rights reserved.</p>
            <div class="mt-4 flex justify-center space-x-4">
                <a href="/index" class="hover:text-blue-400">Home</a>
                <a href="/index#about" class="hover:text-blue-400">About</a>
                <a href="/sublease" class="hover:text-blue-400">Sublease</a>
                <a href="/ai-negotiator" class="hover:text-blue-400">AI Negotiator</a>
                <a href="/listings" class="hover:text-blue-400">Listings</a>
                <a href="/index#contact" class="hover:text-blue-400">Contact</a>
            </div>
        </div>
    </footer>


    <script type="text/javascript">
        var gk_isXlsx = false;
        var gk_xlsxFileLookup = {};
        var gk_fileData = {};
        function filledCell(cell) {
            return cell !== '' && cell != null;
        }
        function loadFileData(filename) {
            if (gk_isXlsx && gk_xlsxFileLookup[filename]) {
                try {
                    var workbook = XLSX.read(gk_fileData[filename], { type: 'base64' });
                    var firstSheetName = workbook.SheetNames[0];
                    var worksheet = workbook.Sheets[firstSheetName];
                    var jsonData = XLSX.utils.sheet_to_json(worksheet, { header: 1, blankrows: false, defval: '' });
                    var filteredData = jsonData.filter(row => row.some(filledCell));
                    var headerRowIndex = filteredData.findIndex((row, index) =>
                        row.filter(filledCell).length >= filteredData[index + 1]?.filter(filledCell).length
                    );
                    if (headerRowIndex === -1 || headerRowIndex > 25) {
                        headerRowIndex = 0;
                    }
                    var csv = XLSX.utils.aoa_to_sheet(filteredData.slice(headerRowIndex));
                    csv = XLSX.utils.sheet_to_csv(csv, { header: 1 });
                    return csv;
                } catch (e) {
                    console.error(e);
                    return "";
                }
            }
            return gk_fileData[filename] || "";
        }
    </script>
    <script>
        // Supabase Configuration
        const SUPABASE_URL = 'https://fkktwhjybuflxqzopaex.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZra3R3aGp5YnVmbHhxem9wYWV4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDc0OTg5NzQsImV4cCI6MjA2MzA3NDk3NH0.4vdk_ozdi_jNNP1dxpAlGF2Km2detytIhN-lMNXNFHs';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const form = document.getElementById('authForm');
        const formTitle = document.getElementById('formTitle');
        const submitButton = document.getElementById('submitButton');
        const toggleForm = document.getElementById('toggleForm');
        const nameFields = document.getElementById('nameFields');
        let isLogin = true;

        toggleForm.addEventListener('click', () => {
            isLogin = !isLogin;
            formTitle.textContent = isLogin ? 'Login' : 'Register';
            submitButton.textContent = isLogin ? 'Login' : 'Register';
            toggleForm.textContent = isLogin ? "Don't have an account? Register" : 'Already have an account? Login';
            nameFields.classList.toggle('hidden', isLogin);
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if (isLogin) {
                // Login logic - check Supabase first, then localStorage as fallback
                try {
                    const { data, error } = await supabase
                        .from('profiles')
                        .select('*')
                        .eq('email', email)
                        .single();
                    
                    if (data && data.password === password) {
                        const user = {
                            firstName: data.first_name,
                            lastName: data.last_name,
                            email: data.email,
                            password: data.password,
                            profileImage: data.profile_image || 'https://via.placeholder.com/40',
                            aiChats: [],
                            listings: []
                        };
                        localStorage.setItem('currentUser', JSON.stringify(user));
                        window.location.href = '/index';
                        return;
                    }
                } catch (err) {
                    console.error('Supabase login error:', err);
                }

                // Fallback to localStorage
                let users = JSON.parse(localStorage.getItem('users')) || [];
                const user = users.find(u => u.email === email && u.password === password);
                if (user) {
                    localStorage.setItem('currentUser', JSON.stringify(user));
                    window.location.href = '/index';
                } else {
                    alert('Invalid email or password.');
                }
            } else {
                // Registration logic
                const firstName = document.getElementById('firstName').value.trim();
                const lastName = document.getElementById('lastName').value.trim();
                if (!firstName || !lastName) {
                    alert('Please fill in all fields.');
                    return;
                }

                try {
                    // Check if user already exists in Supabase
                    const { data: existingUser } = await supabase
                        .from('profiles')
                        .select('email')
                        .eq('email', email)
                        .single();
                    
                    if (existingUser) {
                        alert('Email already registered.');
                        return;
                    }

                    // Insert new user into Supabase
                    const { data, error } = await supabase
                        .from('profiles')
                        .insert([{
                            email: email,
                            password: password,
                            first_name: firstName,
                            last_name: lastName,
                            profile_image: 'https://via.placeholder.com/40'
                        }])
                        .select()
                        .single();

                    if (error) {
                        console.error('Supabase registration error:', error);
                        alert('Registration failed: ' + error.message);
                        return;
                    }

                    // Create user object for localStorage
                    const user = {
                        firstName,
                        lastName,
                        email,
                        password,
                        profileImage: 'https://via.placeholder.com/40',
                        aiChats: [],
                        listings: []
                    };

                    // Also save to localStorage for compatibility
                    let users = JSON.parse(localStorage.getItem('users')) || [];
                    users.push(user);
                    localStorage.setItem('users', JSON.stringify(users));
                    localStorage.setItem('currentUser', JSON.stringify(user));

                    alert('Registration successful!');
                    window.location.href = '/index';
                } catch (err) {
                    console.error('Registration error:', err);
                    alert('Registration failed. Please try again.');
                }
            }
        });
    </script>
</body>
</html>
