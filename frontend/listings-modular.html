<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoomFinderAI - Listings</title>
    
    <!-- External Dependencies -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/typo-js@1.2.3/typo.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    
    <!-- Leaflet Map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
    
    <!-- Authentication -->
    <script src="universal-auth-protection.js"></script>
    <script src="universal-auth-manager.js"></script>
    
    <style>
        /* Modal styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }
        
        .modal.active {
            display: flex;
            opacity: 1;
            visibility: visible;
        }
        
        .modal-content {
            background-color: #fefefe;
            margin: auto;
            padding: 20px;
            border-radius: 8px;
            width: 90%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            transform: translateY(-50px);
            transition: transform 0.3s ease;
        }
        
        .modal.active .modal-content {
            transform: translateY(0);
        }
        
        .close-button {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            position: absolute;
            right: 15px;
            top: 10px;
        }
        
        .close-button:hover {
            color: #000;
        }
        
        /* Listing card styles */
        .listing-card {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        
        .listing-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }
        
        .listing-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
        
        /* Autocomplete styles */
        .autocomplete-item {
            padding: 8px 12px;
            cursor: pointer;
            border-bottom: 1px solid #eee;
        }
        
        .autocomplete-item:hover {
            background-color: #f5f5f5;
        }
        
        .autocomplete-item:last-child {
            border-bottom: none;
        }
        
        /* Map styles */
        #map {
            height: 400px;
            width: 100%;
            border-radius: 8px;
        }
        
        /* Line clamp utility */
        .line-clamp-2 {
            overflow: hidden;
            display: -webkit-box;
            -webkit-box-orient: vertical;
            -webkit-line-clamp: 2;
        }
    </style>
</head>
<body class="bg-gray-100">
    <!-- Navigation Header -->
    <nav class="bg-white shadow-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center">
                    <a href="/" class="text-2xl font-bold text-blue-600">RoomFinderAI</a>
                </div>
                <div class="flex items-center space-x-4">
                    <a href="/" class="text-gray-700 hover:text-blue-600">Home</a>
                    <a href="/listings" class="text-blue-600 font-semibold">Listings</a>
                    <a href="/support" class="text-gray-700 hover:text-blue-600">Support</a>
                    <div id="authSection"></div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        
        <!-- Search Section -->
        <div class="bg-white rounded-lg shadow-md p-6 mb-8">
            <h2 class="text-2xl font-bold text-gray-800 mb-6">Find Your Perfect Room</h2>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Location</label>
                    <input type="text" id="searchLocation" placeholder="City, neighborhood..." 
                           class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Max Price</label>
                    <input type="number" id="searchMaxPrice" placeholder="Enter max price" 
                           class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Room Type</label>
                    <select id="searchRoomType" 
                            class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="">Any type</option>
                        <option value="Apartment">Apartment</option>
                        <option value="House">House</option>
                        <option value="Condo">Condo</option>
                        <option value="Room">Room</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Bedrooms</label>
                    <select id="searchBedrooms" 
                            class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="">Any</option>
                        <option value="1">1 Bedroom</option>
                        <option value="2">2 Bedrooms</option>
                        <option value="3">3 Bedrooms</option>
                        <option value="4+">4+ Bedrooms</option>
                    </select>
                </div>
            </div>
            <div class="mt-4 flex justify-between items-center">
                <div class="search-results-count text-sm text-gray-600"></div>
                <button onclick="clearAllFilters()" 
                        class="px-4 py-2 bg-gray-500 text-white rounded-md hover:bg-gray-600 transition-colors">
                    Clear Filters
                </button>
            </div>
        </div>

        <!-- Map Section -->
        <div class="bg-white rounded-lg shadow-md p-6 mb-8">
            <h3 class="text-xl font-bold text-gray-800 mb-4">Map View</h3>
            <div id="map"></div>
        </div>

        <!-- Listings Grid -->
        <div class="bg-white rounded-lg shadow-md p-6">
            <h3 class="text-xl font-bold text-gray-800 mb-6">Available Listings</h3>
            <div id="listingsContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Listings will be dynamically inserted here -->
                <div class="text-center text-gray-600 col-span-full">Loading listings...</div>
            </div>
        </div>

        <!-- Add Listing Form -->
        <div class="bg-white rounded-lg shadow-md p-6 mt-8">
            <h3 class="text-xl font-bold text-gray-800 mb-6">Add New Listing</h3>
            <form id="listingForm" class="space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Title *</label>
                        <input type="text" id="title" required 
                               class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Price ($/month) *</label>
                        <input type="number" id="price" required 
                               class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div class="relative">
                        <label class="block text-sm font-medium text-gray-700 mb-2">City *</label>
                        <input type="text" id="city" required 
                               class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <div id="city-autocomplete-dropdown" 
                             class="absolute z-10 w-full bg-white border border-gray-300 rounded-md shadow-lg hidden max-h-60 overflow-y-auto">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Country *</label>
                        <input type="text" id="country" required value="Canada" 
                               class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Street Address *</label>
                        <input type="text" id="street" required 
                               class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Postal Code *</label>
                        <input type="text" id="postalCode" required 
                               class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">House Type *</label>
                        <select id="houseType" required 
                                class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                            <option value="">Select type</option>
                            <option value="Apartment">Apartment</option>
                            <option value="House">House</option>
                            <option value="Condo">Condo</option>
                            <option value="Room">Room</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Bedrooms *</label>
                        <select id="bedrooms" required 
                                class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                            <option value="">Select bedrooms</option>
                            <option value="1">1 Bedroom</option>
                            <option value="2">2 Bedrooms</option>
                            <option value="3">3 Bedrooms</option>
                            <option value="4">4 Bedrooms</option>
                            <option value="5">5+ Bedrooms</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Utilities</label>
                        <select id="utilities" 
                                class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                            <option value="Included">Included</option>
                            <option value="Not Included">Not Included</option>
                            <option value="Partially Included">Partially Included</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Description</label>
                    <textarea id="description" rows="4" 
                              class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                              placeholder="Describe your listing..."></textarea>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Photos/Videos</label>
                    <input type="file" id="media" multiple accept="image/*,video/*" 
                           class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <div id="mediaPreview" class="mt-2 grid grid-cols-2 md:grid-cols-4 gap-2"></div>
                </div>
                <button type="submit" 
                        class="w-full bg-blue-600 text-white py-3 px-4 rounded-md hover:bg-blue-700 transition-colors font-semibold">
                    Add Listing
                </button>
            </form>
        </div>
    </div>

    <!-- Listing Modal -->
    <div id="listingModal" class="modal">
        <div class="modal-content">
            <span class="close-button">&times;</span>
            <div class="mb-4">
                <img id="modalImage" src="" alt="" class="w-full h-64 object-cover rounded-lg mb-4">
                <h2 id="modalTitle" class="text-2xl font-bold text-gray-800 mb-2"></h2>
                <p id="modalPrice" class="text-2xl font-bold text-blue-600 mb-2"></p>
                <p id="modalLocation" class="text-gray-600 mb-4"></p>
                <div id="modalDetails" class="text-sm text-gray-600 mb-4"></div>
                <p id="modalDescription" class="text-gray-700 mb-4"></p>
                <div id="modalMedia" class="grid grid-cols-2 md:grid-cols-3 gap-2 mb-4"></div>
                <a id="modalViewDetails" href="#" 
                   class="inline-block bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition-colors">
                    View Full Details
                </a>
            </div>
        </div>
    </div>

    <!-- Chat Modal (placeholder for existing chat functionality) -->
    <div id="chatModal" class="modal">
        <div class="modal-content">
            <span class="chat-close-button close-button">&times;</span>
            <h2 id="chatTitle" class="text-xl font-bold mb-4">Chat</h2>
            <div id="chatMessages" class="h-64 border border-gray-300 rounded-lg p-4 mb-4 overflow-y-auto"></div>
            <div class="flex space-x-2">
                <input type="text" id="chatInput" placeholder="Type your message..." 
                       class="flex-1 px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                <button id="chatSendBtn" 
                        class="bg-blue-600 text-white px-4 py-2 rounded-md hover:bg-blue-700 transition-colors">
                    Send
                </button>
            </div>
        </div>
    </div>

    <!-- JavaScript Modules -->
    <script type="module">
        // Import the modular functions
        import ListingsAPI from './listings-api.js';
        import ListingsUI from './listings-ui.js';
        import SearchFilter from './search-filter.js';

        // Global configuration variables
        let SUPABASE_URL;
        let SUPABASE_ANON_KEY;
        let GOOGLE_API_KEY;
        let supabase;

        // Global initialization state tracking
        let isConfigLoaded = false;
        let isDOMReady = false;
        let initializationAttempts = 0;
        const MAX_INIT_ATTEMPTS = 3;

        // Map-related variables
        let map;
        let markerClusterGroup;

        // Load configuration from Railway API
        async function loadConfiguration() {
            try {
                const response = await fetch('/api/config');
                const config = await response.json();
                
                SUPABASE_URL = config.SUPABASE_URL;
                SUPABASE_ANON_KEY = config.SUPABASE_ANON_KEY;
                GOOGLE_API_KEY = config.GOOGLE_API_KEY;
                
                console.log('🔧 Config loaded:', {
                    hasSupabaseURL: !!SUPABASE_URL,
                    hasSupabaseKey: !!SUPABASE_ANON_KEY,
                    hasGoogleKey: !!GOOGLE_API_KEY
                });

                // Initialize Supabase client
                supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                console.log('📡 Supabase client initialized');
                
                isConfigLoaded = true;
                attemptInitialization();
                
            } catch (error) {
                console.error('❌ Failed to load configuration:', error);
                showError('Failed to load configuration. Please refresh the page.');
            }
        }

        // Wait for DOM to be ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => {
                console.log('📄 DOM Content Loaded');
                isDOMReady = true;
                attemptInitialization();
            });
        } else {
            console.log('📄 DOM already ready');
            isDOMReady = true;
            attemptInitialization();
        }

        // Safe initialization function with retry mechanism
        function attemptInitialization() {
            console.log('🚀 Attempting initialization...', {
                configLoaded: isConfigLoaded,
                domReady: isDOMReady,
                attempt: initializationAttempts + 1
            });

            if (!isConfigLoaded || !isDOMReady) {
                console.log('⏳ Waiting for prerequisites...');
                return;
            }

            initializationAttempts++;
            
            try {
                console.log(`🔄 Starting initialization attempt ${initializationAttempts}/${MAX_INIT_ATTEMPTS}`);
                initializeApplication();
                console.log('✅ Initialization completed successfully');
            } catch (error) {
                console.error(`❌ Initialization attempt ${initializationAttempts} failed:`, error);
                
                if (initializationAttempts < MAX_INIT_ATTEMPTS) {
                    console.log(`🔄 Retrying in 1 second... (${MAX_INIT_ATTEMPTS - initializationAttempts} attempts remaining)`);
                    setTimeout(() => {
                        attemptInitialization();
                    }, 1000);
                } else {
                    console.error('💥 All initialization attempts failed.');
                    showError('Application initialization failed. Some features may not work. Please refresh the page.');
                }
            }
        }

        // Main application initialization
        async function initializeApplication() {
            console.log('🔧 Initializing modular listings application...');

            // Initialize modules
            ListingsAPI.initializeAPI({
                supabase,
                SUPABASE_URL,
                SUPABASE_ANON_KEY
            });

            ListingsUI.initializeUI();
            SearchFilter.initializeSearchFilter();

            // Setup authentication
            await setupAuthentication();

            // Initialize map
            initMap();

            // Load and display listings
            await ListingsUI.displayListings();

            // Setup form submission
            setupFormSubmission();

            // Setup real-time subscription
            setupRealtimeSubscription();

            // Make functions globally accessible for backwards compatibility
            window.clearAllFilters = SearchFilter.clearAllFilters;
            window.filterListings = SearchFilter.filterListings;

            console.log('✅ Modular application initialized successfully');
        }

        // Setup authentication
        async function setupAuthentication() {
            const authSection = document.getElementById('authSection');
            const currentUser = JSON.parse(localStorage.getItem('currentUser'));

            if (!currentUser) {
                console.log('No current user, showing anonymous interface');
                authSection.innerHTML = `
                    <a href="/login" class="text-gray-700 hover:text-blue-600">Login</a>
                    <a href="/signup" class="text-gray-700 hover:text-blue-600">Sign Up</a>
                `;
                return;
            }

            // Set current user email for RLS
            try {
                const { error } = await supabase.rpc('set_current_user_email', { email: currentUser.email });
                if (error) {
                    console.error('Error setting current user email:', error);
                } else {
                    console.log('Current user email set for RLS:', currentUser.email);
                }
            } catch (err) {
                console.error('RPC call failed:', err);
            }

            // Display user profile
            authSection.innerHTML = `
                <div class="flex items-center space-x-2">
                    <a href="/profile">
                        <img src="${currentUser.profileImage || '/default-avatar.svg'}" 
                             alt="Profile" class="w-8 h-8 rounded-full">
                    </a>
                </div>
            `;
        }

        // Initialize map
        function initMap() {
            console.log('🗺️ Initializing map...');
            
            if (typeof L === 'undefined') {
                console.error('❌ Leaflet library not loaded');
                return;
            }

            try {
                map = L.map('map').setView([43.6532, -79.3832], 10);

                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    attribution: '© OpenStreetMap contributors',
                    maxZoom: 19
                }).addTo(map);

                markerClusterGroup = L.markerClusterGroup();
                map.addLayer(markerClusterGroup);

                console.log('✅ Map initialized successfully');
            } catch (error) {
                console.error('❌ Error initializing map:', error);
            }
        }

        // Update map with listings
        async function updateMap(listings) {
            if (!map || !markerClusterGroup) {
                console.warn('⚠️ Map not initialized, skipping update');
                return;
            }

            console.log('📍 Updating map with', listings.length, 'listings...');

            markerClusterGroup.clearLayers();

            for (const listing of listings) {
                try {
                    // Use Google Geocoding API to get coordinates
                    const address = `${listing.street}, ${listing.city}, ${listing.postalCode}`;
                    const response = await fetch(
                        `https://maps.googleapis.com/maps/api/geocode/json?address=${encodeURIComponent(address)}&key=${GOOGLE_API_KEY}`
                    );
                    const data = await response.json();

                    if (data.results && data.results.length > 0) {
                        const location = data.results[0].geometry.location;
                        const marker = L.marker([location.lat, location.lng])
                            .bindPopup(`
                                <div class="p-2">
                                    <h3 class="font-semibold">${listing.title}</h3>
                                    <p class="text-blue-600 font-bold">$${listing.price}/mo</p>
                                    <p class="text-sm text-gray-600">${listing.bedrooms} bed • ${listing.house_type}</p>
                                    <button onclick="showListingDetails(${listing.id})" 
                                            class="mt-2 bg-blue-600 text-white px-3 py-1 rounded text-sm">
                                        View Details
                                    </button>
                                </div>
                            `);
                        markerClusterGroup.addLayer(marker);
                    }
                } catch (error) {
                    console.warn('⚠️ Failed to geocode address for listing:', listing.id, error);
                }
            }

            console.log('📍 Map updated with markers');
        }

        // Setup form submission
        function setupFormSubmission() {
            const form = document.getElementById('listingForm');
            if (!form) return;

            form.addEventListener('submit', async (e) => {
                e.preventDefault();

                const currentUser = JSON.parse(localStorage.getItem('currentUser'));
                if (!currentUser) {
                    alert('Please log in to add a listing.');
                    window.location.href = '/login';
                    return;
                }

                try {
                    // Get form data
                    const formData = new FormData(form);
                    const listingData = {
                        title: SearchFilter.autocorrectInput(document.getElementById('title').value.trim()),
                        price: parseInt(document.getElementById('price').value),
                        city: SearchFilter.cleanAddressInput(document.getElementById('city').value),
                        country: document.getElementById('country').value.trim(),
                        street: SearchFilter.cleanAddressInput(document.getElementById('street').value),
                        postalCode: document.getElementById('postalCode').value.trim().toUpperCase(),
                        house_type: document.getElementById('houseType').value,
                        bedrooms: parseInt(document.getElementById('bedrooms').value),
                        utilities: document.getElementById('utilities').value,
                        description: SearchFilter.autocorrectInput(document.getElementById('description').value.trim()),
                        user_email: currentUser.email,
                        created_at: new Date().toISOString()
                    };

                    // Upload media if any
                    const mediaInput = document.getElementById('media');
                    if (mediaInput.files.length > 0) {
                        const files = Array.from(mediaInput.files).map(file => ({
                            file,
                            name: file.name,
                            type: file.type
                        }));
                        listingData.media = await ListingsAPI.uploadMedia(files);
                    } else {
                        listingData.media = [];
                    }

                    // Create listing
                    const newListing = await ListingsAPI.createListing(listingData);
                    
                    // Reset form
                    form.reset();
                    document.getElementById('mediaPreview').innerHTML = '';

                    alert('Listing added successfully!');
                    
                    // Refresh listings display
                    await ListingsUI.displayListings();

                } catch (error) {
                    console.error('❌ Error creating listing:', error);
                    alert('Failed to add listing: ' + error.message);
                }
            });
        }

        // Setup real-time subscription
        function setupRealtimeSubscription() {
            ListingsAPI.subscribeToListings(async (event, listing) => {
                console.log('📨 Real-time event:', event, listing);
                
                switch (event) {
                    case 'INSERT':
                        // Refresh listings to show new listing
                        await ListingsUI.displayListings();
                        break;
                    case 'UPDATE':
                        // Update specific listing card
                        ListingsUI.updateListingCard(listing);
                        break;
                    case 'DELETE':
                        // Remove listing card
                        ListingsUI.removeListingCard(listing.id);
                        break;
                }
            });
        }

        // Listen for UI events
        document.addEventListener('listingsDisplayed', async (event) => {
            const { listings } = event.detail;
            await updateMap(listings);
        });

        document.addEventListener('startConversation', (event) => {
            const { listing } = event.detail;
            // Handle chat functionality (would integrate with existing chat system)
            console.log('💬 Starting conversation for listing:', listing.title);
            // For now, just show an alert
            alert(`Chat functionality would open for: ${listing.title}`);
        });

        // Utility function to show errors
        function showError(message) {
            const errorDiv = document.createElement('div');
            errorDiv.className = 'fixed top-4 right-4 bg-red-500 text-white p-4 rounded-lg shadow-lg z-50';
            errorDiv.textContent = message;
            document.body.appendChild(errorDiv);
            
            setTimeout(() => {
                errorDiv.remove();
            }, 5000);
        }

        // Global function for showing listing details (for map popup)
        window.showListingDetails = async (listingId) => {
            try {
                const listing = await ListingsAPI.getListingById(listingId);
                ListingsUI.showListingModal(listing);
            } catch (error) {
                console.error('❌ Error loading listing details:', error);
                alert('Error loading listing details');
            }
        };

        // Start the configuration loading process
        loadConfiguration();
    </script>
</body>
</html>
