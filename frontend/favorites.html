<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <title>RoomFinderAI - My Favorites</title>

    <script src="universal-auth-protection.js"></script>
    <script src="universal-auth-manager.js"></script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f8fafc;
            min-height: 100vh;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand-logo {
            color: white;
            font-size: 1.5rem;
            font-weight: 700;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }

        .nav-link {
            color: rgba(255,255,255,0.9);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        .nav-link:hover {
            color: white;
        }

        /* Page Header */
        .page-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 3rem 1rem;
            text-align: center;
            color: white;
        }

        .page-header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .page-header p {
            opacity: 0.9;
            font-size: 1.1rem;
        }

        /* Main Content */
        .main-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        /* Favorites Grid */
        .favorites-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        /* Listing Card */
        .listing-card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
            opacity: 0;
            animation: fadeInUp 0.4s ease forwards;
        }

        .listing-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 30px rgba(0,0,0,0.15);
        }

        .listing-card:nth-child(1) { animation-delay: 0.05s; }
        .listing-card:nth-child(2) { animation-delay: 0.1s; }
        .listing-card:nth-child(3) { animation-delay: 0.15s; }
        .listing-card:nth-child(4) { animation-delay: 0.2s; }
        .listing-card:nth-child(5) { animation-delay: 0.25s; }
        .listing-card:nth-child(6) { animation-delay: 0.3s; }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .listing-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .listing-content {
            padding: 1.25rem;
        }

        .listing-title {
            font-size: 1.125rem;
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 0.5rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .listing-price {
            font-size: 1.25rem;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 0.5rem;
        }

        .listing-address {
            color: #6b7280;
            font-size: 0.875rem;
            margin-bottom: 0.75rem;
        }

        .listing-details {
            display: flex;
            gap: 1rem;
            color: #6b7280;
            font-size: 0.875rem;
            margin-bottom: 1rem;
        }

        .listing-detail {
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .listing-actions {
            display: flex;
            gap: 0.5rem;
        }

        .btn {
            flex: 1;
            padding: 0.75rem 1rem;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            text-align: center;
            text-decoration: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-danger {
            background: #fef2f2;
            color: #ef4444;
            border: 1px solid #fecaca;
        }

        .btn-danger:hover {
            background: #fee2e2;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }

        .empty-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        .empty-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 0.5rem;
        }

        .empty-text {
            color: #6b7280;
            margin-bottom: 1.5rem;
        }

        /* Loading */
        .loading-container {
            text-align: center;
            padding: 4rem 2rem;
        }

        .loading-spinner {
            width: 48px;
            height: 48px;
            border: 4px solid #e5e7eb;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Skeleton */
        .skeleton-card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }

        .skeleton-image {
            height: 200px;
            background: linear-gradient(90deg, #e8e8e8 25%, #f5f5f5 50%, #e8e8e8 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite ease-in-out;
        }

        .skeleton-content {
            padding: 1.25rem;
        }

        .skeleton-line {
            height: 16px;
            background: linear-gradient(90deg, #e8e8e8 25%, #f5f5f5 50%, #e8e8e8 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite ease-in-out;
            border-radius: 4px;
            margin-bottom: 0.75rem;
        }

        .skeleton-line.short { width: 60%; }
        .skeleton-line.medium { width: 80%; }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* Stats Bar */
        .stats-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding: 1rem 1.5rem;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        .stats-count {
            font-weight: 600;
            color: #1f2937;
        }

        .stats-count span {
            color: #667eea;
        }

        /* Mobile Menu */
        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .nav-links {
                display: none;
            }

            .mobile-menu-btn {
                display: block;
            }

            .page-header h1 {
                font-size: 1.75rem;
            }

            .favorites-grid {
                grid-template-columns: 1fr;
            }

            .stats-bar {
                flex-direction: column;
                gap: 0.75rem;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <nav class="nav-container">
            <a href="index.html" class="brand-logo">RoomFinderAI</a>
            <div class="nav-links">
                <a href="index.html" class="nav-link">Home</a>
                <a href="listings.html" class="nav-link">Listings</a>
                <a href="profile.html" class="nav-link">Profile</a>
            </div>
            <button class="mobile-menu-btn" onclick="window.location.href='index.html'">
                <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                </svg>
            </button>
        </nav>
    </header>

    <!-- Page Header -->
    <section class="page-header">
        <h1>My Favorites</h1>
        <p>Your saved properties in one place</p>
    </section>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Stats Bar -->
        <div class="stats-bar">
            <div class="stats-count" id="favoritesCount">Loading...</div>
            <a href="listings.html" class="btn btn-primary" style="flex: none; padding: 0.5rem 1rem;">Browse More Listings</a>
        </div>

        <!-- Favorites Grid -->
        <div class="favorites-grid" id="favoritesGrid">
            <!-- Loading skeleton -->
            <div class="skeleton-card">
                <div class="skeleton-image"></div>
                <div class="skeleton-content">
                    <div class="skeleton-line medium"></div>
                    <div class="skeleton-line short"></div>
                    <div class="skeleton-line"></div>
                </div>
            </div>
            <div class="skeleton-card">
                <div class="skeleton-image"></div>
                <div class="skeleton-content">
                    <div class="skeleton-line medium"></div>
                    <div class="skeleton-line short"></div>
                    <div class="skeleton-line"></div>
                </div>
            </div>
            <div class="skeleton-card">
                <div class="skeleton-image"></div>
                <div class="skeleton-content">
                    <div class="skeleton-line medium"></div>
                    <div class="skeleton-line short"></div>
                    <div class="skeleton-line"></div>
                </div>
            </div>
        </div>

        <!-- Empty State (hidden by default) -->
        <div class="empty-state" id="emptyState" style="display: none;">
            <div class="empty-icon">&#10084;</div>
            <h2 class="empty-title">No favorites yet</h2>
            <p class="empty-text">Start browsing listings and tap the heart icon to save your favorites!</p>
            <a href="listings.html" class="btn btn-primary" style="display: inline-block; padding: 0.75rem 2rem;">Browse Listings</a>
        </div>
    </main>

    <script>
        // Initialize Supabase
        const SUPABASE_URL = 'https://iqctmmwqqncyhoqggtcp.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlxY3RtbXdxcW5jeWhvcWdndGNwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDcwMTY1NzIsImV4cCI6MjA2MjU5MjU3Mn0.NUQHQ39p_6kNXV6VLO5_q4pZ8aE26LsG5BY-5_2_Wsg';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Check authentication and load favorites
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                // Check if user is logged in
                const currentUser = JSON.parse(localStorage.getItem('currentUser'));

                if (!currentUser || !currentUser.email) {
                    // Redirect to login if not authenticated
                    alert('Please log in to view your favorites');
                    window.location.href = 'login.html';
                    return;
                }

                console.log('Loading favorites for user:', currentUser.email);
                await loadFavorites(currentUser.email);
            } catch (error) {
                console.error('Error initializing favorites page:', error);
                showError('Failed to load favorites. Please try again.');
            }
        });

        async function loadFavorites(userEmail) {
            const grid = document.getElementById('favoritesGrid');
            const emptyState = document.getElementById('emptyState');
            const countEl = document.getElementById('favoritesCount');

            try {
                // Fetch user's favorites from API
                const response = await fetch(`/api/favorites?userEmail=${encodeURIComponent(userEmail)}`);

                if (!response.ok) {
                    throw new Error('Failed to fetch favorites');
                }

                const favorites = await response.json();
                console.log('Loaded favorites:', favorites);

                if (!favorites || favorites.length === 0) {
                    grid.style.display = 'none';
                    emptyState.style.display = 'block';
                    countEl.innerHTML = '<span>0</span> saved properties';
                    return;
                }

                // Update count
                countEl.innerHTML = `<span>${favorites.length}</span> saved propert${favorites.length === 1 ? 'y' : 'ies'}`;

                // Render favorites
                grid.innerHTML = '';
                emptyState.style.display = 'none';
                grid.style.display = 'grid';

                for (const favorite of favorites) {
                    const listing = favorite.listing || favorite;
                    if (!listing) continue;

                    const card = createListingCard(listing, favorite.id || favorite.listing_id);
                    grid.appendChild(card);
                }

            } catch (error) {
                console.error('Error loading favorites:', error);

                // Try direct Supabase query as fallback
                try {
                    console.log('Trying direct Supabase query...');
                    const { data: favorites, error: dbError } = await supabase
                        .from('favorites')
                        .select(`
                            id,
                            listing_id,
                            listings (*)
                        `)
                        .eq('user_email', userEmail);

                    if (dbError) throw dbError;

                    if (!favorites || favorites.length === 0) {
                        grid.style.display = 'none';
                        emptyState.style.display = 'block';
                        countEl.innerHTML = '<span>0</span> saved properties';
                        return;
                    }

                    countEl.innerHTML = `<span>${favorites.length}</span> saved propert${favorites.length === 1 ? 'y' : 'ies'}`;

                    grid.innerHTML = '';
                    emptyState.style.display = 'none';
                    grid.style.display = 'grid';

                    for (const favorite of favorites) {
                        const listing = favorite.listings;
                        if (!listing) continue;

                        const card = createListingCard(listing, favorite.listing_id);
                        grid.appendChild(card);
                    }

                } catch (fallbackError) {
                    console.error('Fallback also failed:', fallbackError);
                    showError('Failed to load favorites. Please try again later.');
                }
            }
        }

        function createListingCard(listing, favoriteId) {
            const card = document.createElement('div');
            card.className = 'listing-card';

            // Get primary image
            let primaryImage = 'data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMzAwIiBoZWlnaHQ9IjIwMCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWxsPSIjZjNmNGY2Ii8+PHRleHQgeD0iNTAlIiB5PSI1MCUiIGZvbnQtZmFtaWx5PSJBcmlhbCIgZm9udC1zaXplPSIxOCIgZmlsbD0iIzY2NzI4MCIgdGV4dC1hbmNob3I9Im1pZGRsZSIgZHk9Ii4zZW0iPk5vIEltYWdlPC90ZXh0Pjwvc3ZnPg==';

            if (listing.media && Array.isArray(listing.media) && listing.media.length > 0) {
                const firstMedia = listing.media[0];
                if (firstMedia && firstMedia.url) {
                    primaryImage = firstMedia.url;
                }
            }

            const price = listing.price ? `$${listing.price.toLocaleString()}/mo` : 'Price N/A';
            const address = [listing.street, listing.city, listing.postalCode].filter(Boolean).join(', ') || 'Address N/A';

            card.innerHTML = `
                <img src="${primaryImage}" alt="${listing.title || 'Listing'}" class="listing-image" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMzAwIiBoZWlnaHQ9IjIwMCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWxsPSIjZmY2Njc3Ii8+PHRleHQgeD0iNTAlIiB5PSI1MCUiIGZvbnQtZmFtaWx5PSJBcmlhbCIgZm9udC1zaXplPSIxOCIgZmlsbD0iI2ZmZmZmZiIgdGV4dC1hbmNob3I9Im1pZGRsZSIgZHk9Ii4zZW0iPkltYWdlIE5vdCBBdmFpbGFibGU8L3RleHQ+PC9zdmc+'">
                <div class="listing-content">
                    <h3 class="listing-title">${listing.title || 'Untitled Listing'}</h3>
                    <p class="listing-price">${price}</p>
                    <p class="listing-address">${address}</p>
                    <div class="listing-details">
                        ${listing.bedrooms ? `<span class="listing-detail"><svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg> ${listing.bedrooms} bed</span>` : ''}
                        ${listing.bathrooms ? `<span class="listing-detail"><svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 14v3m4-3v3m4-3v3M3 21h18M3 10h18M3 7l9-4 9 4M4 10h16v11H4V10z"/></svg> ${listing.bathrooms} bath</span>` : ''}
                    </div>
                    <div class="listing-actions">
                        <a href="listings.html?view=${listing.id}" class="btn btn-primary">View Details</a>
                        <button class="btn btn-danger" onclick="removeFavorite('${listing.id}', this)">
                            <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24" style="vertical-align: middle; margin-right: 4px;">
                                <path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                            </svg>
                            Remove
                        </button>
                    </div>
                </div>
            `;

            return card;
        }

        async function removeFavorite(listingId, buttonElement) {
            const currentUser = JSON.parse(localStorage.getItem('currentUser'));
            if (!currentUser) return;

            const card = buttonElement.closest('.listing-card');

            // Add removing animation
            card.style.transition = 'all 0.3s ease';
            card.style.opacity = '0.5';
            card.style.transform = 'scale(0.95)';

            try {
                const response = await fetch(`/api/favorites/${listingId}?userEmail=${encodeURIComponent(currentUser.email)}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    // Animate out and remove
                    card.style.opacity = '0';
                    card.style.transform = 'scale(0.8)';

                    setTimeout(() => {
                        card.remove();

                        // Update count
                        const grid = document.getElementById('favoritesGrid');
                        const remaining = grid.querySelectorAll('.listing-card').length;
                        const countEl = document.getElementById('favoritesCount');
                        countEl.innerHTML = `<span>${remaining}</span> saved propert${remaining === 1 ? 'y' : 'ies'}`;

                        // Show empty state if no more favorites
                        if (remaining === 0) {
                            grid.style.display = 'none';
                            document.getElementById('emptyState').style.display = 'block';
                        }
                    }, 300);
                } else {
                    throw new Error('Failed to remove favorite');
                }
            } catch (error) {
                console.error('Error removing favorite:', error);
                // Reset card state
                card.style.opacity = '1';
                card.style.transform = 'scale(1)';
                alert('Failed to remove from favorites. Please try again.');
            }
        }

        function showError(message) {
            const grid = document.getElementById('favoritesGrid');
            grid.innerHTML = `
                <div style="grid-column: 1 / -1; text-align: center; padding: 3rem; color: #ef4444;">
                    <p style="font-size: 1.125rem; margin-bottom: 1rem;">${message}</p>
                    <button onclick="location.reload()" class="btn btn-primary">Try Again</button>
                </div>
            `;
        }
    </script>
</body>
</html>
