<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoomFinderAI - AI-Powered Rental Search & Negotiation</title>
    
    <!-- 🛡️ UNIVERSAL AUTHENTICATION PROTECTION SYSTEM -->
    <script src="universal-auth-protection.js?v=2.0.2"></script>
    
    <!-- 🔄 UNIVERSAL AUTHENTICATION MANAGER -->
    <script src="universal-auth-manager.js?v=2.0.1"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/typo-js@1.2.3/typo.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/global-styles.css">
    
    <!-- Load component loader -->
    <script src="component-loader.js"></script>
    
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --secondary-gradient: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --accent-gradient: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            --glass-bg: rgba(255, 255, 255, 0.25);
            --glass-border: rgba(255, 255, 255, 0.18);
            --shadow-soft: 0 8px 32px rgba(31, 38, 135, 0.37);
            --shadow-hard: 0 20px 40px rgba(0, 0, 0, 0.1);
            --transition-smooth: all 0.4s cubic-bezier(0.23, 1, 0.320, 1);
            --transition-bounce: all 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        
        * {
            scroll-behavior: smooth;
        }
        
        /* Enhanced smooth scrolling and performance */
        html {
            scroll-behavior: smooth;
        }
        
        body {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            overflow-x: hidden;
        }
        
        /* Hardware acceleration for better performance */
        .reveal, .reveal-left, .reveal-right, .scale-in, .feature-card, .glass-card {
            will-change: transform, opacity;
            transform: translateZ(0);
            backface-visibility: hidden;
        }
        
        .font-display {
            font-family: 'Space Grotesk', 'Inter', sans-serif;
        }
        
        /* All the existing styles from index.html would go here */
        /* For brevity, I'm including just the essential ones */
    </style>
    <script src="/js/service-checker.js" defer></script>
</head>
<body class="bg-gray-50 flex flex-col min-h-screen">
    
    <!-- Header Component -->
    <div id="header-container" data-component="components/header.html"></div>
    
    <!-- Hero Component -->
    <div id="hero-container" data-component="components/hero.html"></div>
    
    <!-- Main Content Component -->
    <div id="main-content-container" data-component="components/main-content.html"></div>
    
    <!-- Footer Component -->
    <div id="footer-container" data-component="components/footer.html"></div>
    
    <!-- All the existing scripts would be loaded here -->
    <script>
        // Header scroll effect
        window.addEventListener('scroll', () => {
            const header = document.getElementById('header');
            if (header) {
                if (window.scrollY > 50) {
                    header.classList.add('scrolled');
                } else {
                    header.classList.remove('scrolled');
                }
            }
        });

        // Mobile menu toggle
        function toggleMobileMenu() {
            const btn = document.querySelector('.mobile-menu-btn');
            const menu = document.getElementById('mobile-menu');
            if (btn && menu) {
                btn.classList.toggle('active');
                menu.classList.toggle('active');
                document.body.classList.toggle('mobile-menu-open');
            }
        }
        
        function closeMobileMenu() {
            const btn = document.querySelector('.mobile-menu-btn');
            const menu = document.getElementById('mobile-menu');
            if (btn && menu) {
                btn.classList.remove('active');
                menu.classList.remove('active');
                document.body.classList.remove('mobile-menu-open');
            }
        }

        // Dropdown toggle
        function toggleDropdown(id) {
            const dropdown = document.getElementById(id + '-dropdown');
            if (dropdown) {
                dropdown.classList.toggle('active');
            }
        }
        
        // Close dropdowns when clicking outside
        window.onclick = function(event) {
            if (!event.target.matches('.dropdown-trigger')) {
                var dropdowns = document.getElementsByClassName("dropdown-menu");
                for (var i = 0; i < dropdowns.length; i++) {
                    var openDropdown = dropdowns[i];
                    if (openDropdown.classList.contains('active')) {
                        openDropdown.classList.remove('active');
                    }
                }
            }
        }
        
        // Mobile section toggle
        function toggleMobileSection(id) {
            const section = document.getElementById(id + '-section');
            const arrow = document.getElementById(id + '-arrow');
            if (section && arrow) {
                section.classList.toggle('expanded');
                arrow.classList.toggle('rotated');
            }
        }

        // Typing animation
        const typingText = document.getElementById('typing-text');
        const words = ["Space", "Deal", "Home"];
        let wordIndex = 0;
        let charIndex = 0;
        let isDeleting = false;

        function type() {
            const currentWord = words[wordIndex];
            if (isDeleting) {
                if (typingText) typingText.textContent = currentWord.substring(0, charIndex - 1);
                charIndex--;
            } else {
                if (typingText) typingText.textContent = currentWord.substring(0, charIndex + 1);
                charIndex++;
            }

            if (!isDeleting && charIndex === currentWord.length) {
                setTimeout(() => isDeleting = true, 2000);
            } else if (isDeleting && charIndex === 0) {
                isDeleting = false;
                wordIndex = (wordIndex + 1) % words.length;
            }

            const typingSpeed = isDeleting ? 100 : 200;
            setTimeout(type, typingSpeed);
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            // Start typing animation after components are loaded
            setTimeout(() => {
                const typingText = document.getElementById('typing-text');
                if (typingText) {
                    type();
                }
            }, 500);
        });

        // Additional component initialization can go here
    </script>
</body>
</html>
