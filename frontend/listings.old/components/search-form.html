<!-- Reusable Search Form Component Template -->
<template id="search-form-template">
    <div class="search-form-container bg-white p-6 rounded-lg shadow-lg">
        <h3 class="text-lg font-semibold mb-4">Find Your Perfect Room</h3>
        
        <form id="search-form" class="space-y-4">
            <!-- Location Inputs -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="form-group">
                    <label for="city" class="block text-sm font-medium text-gray-700 mb-1">City</label>
                    <input 
                        type="text" 
                        id="city" 
                        name="city" 
                        class="modern-input w-full"
                        placeholder="Enter city..."
                    >
                </div>
                
                <div class="form-group">
                    <label for="country" class="block text-sm font-medium text-gray-700 mb-1">Country</label>
                    <input 
                        type="text" 
                        id="country" 
                        name="country" 
                        class="modern-input w-full"
                        placeholder="Enter country..."
                    >
                </div>
            </div>
            
            <!-- Room Type and Price -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="form-group">
                    <label for="roomType" class="block text-sm font-medium text-gray-700 mb-1">Room Type</label>
                    <select id="roomType" name="roomType" class="modern-input w-full">
                        <option value="">Any</option>
                        <option value="Private Room">Private Room</option>
                        <option value="Shared Room">Shared Room</option>
                        <option value="Entire Place">Entire Place</option>
                        <option value="Studio">Studio</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="minPrice" class="block text-sm font-medium text-gray-700 mb-1">Min Price</label>
                    <input 
                        type="number" 
                        id="minPrice" 
                        name="minPrice" 
                        class="modern-input w-full"
                        placeholder="Min"
                        min="0"
                    >
                </div>
                
                <div class="form-group">
                    <label for="maxPrice" class="block text-sm font-medium text-gray-700 mb-1">Max Price</label>
                    <input 
                        type="number" 
                        id="maxPrice" 
                        name="maxPrice" 
                        class="modern-input w-full"
                        placeholder="Max"
                        min="0"
                    >
                </div>
            </div>
            
            <!-- Amenities -->
            <div class="form-group">
                <label class="block text-sm font-medium text-gray-700 mb-2">Amenities</label>
                <div class="grid grid-cols-2 md:grid-cols-3 gap-2">
                    <label class="flex items-center">
                        <input type="checkbox" id="wifi" name="wifi" class="mr-2">
                        <span class="text-sm">WiFi</span>
                    </label>
                    <label class="flex items-center">
                        <input type="checkbox" id="parking" name="parking" class="mr-2">
                        <span class="text-sm">Parking</span>
                    </label>
                    <label class="flex items-center">
                        <input type="checkbox" id="kitchen" name="kitchen" class="mr-2">
                        <span class="text-sm">Kitchen</span>
                    </label>
                    <label class="flex items-center">
                        <input type="checkbox" id="laundry" name="laundry" class="mr-2">
                        <span class="text-sm">Laundry</span>
                    </label>
                    <label class="flex items-center">
                        <input type="checkbox" id="furnished" name="furnished" class="mr-2">
                        <span class="text-sm">Furnished</span>
                    </label>
                    <label class="flex items-center">
                        <input type="checkbox" id="petsAllowed" name="petsAllowed" class="mr-2">
                        <span class="text-sm">Pets Allowed</span>
                    </label>
                </div>
            </div>
            
            <!-- Search Button -->
            <div class="flex justify-between items-center">
                <button type="button" id="clear-filters" class="text-gray-500 hover:text-gray-700">
                    Clear Filters
                </button>
                <button type="submit" id="search-button" class="modern-button">
                    Search Listings
                </button>
            </div>
        </form>
    </div>
</template>
