<!-- Reusable Chat Modal Component Template -->
<template id="chat-modal-template">
    <div id="chatModal" class="chat-modal">
        <div class="chat-modal-content">
            <div class="chat-header">
                <h3 id="chatTitle" class="text-lg font-semibold">Chat</h3>
                <button id="chatClose" class="close-button text-gray-400 hover:text-gray-600">×</button>
            </div>
            
            <div id="chatMessages" class="chat-messages"></div>
            
            <div class="chat-input-container">
                <textarea 
                    id="chatInput" 
                    class="chat-input" 
                    placeholder="Type your message..."
                    rows="1"
                ></textarea>
                <input type="file" id="fileUpload" accept=".pdf,.doc,.docx,.txt,.jpg,.jpeg,.png,.gif,.webp" style="display: none;">
                <button type="button" onclick="document.getElementById('fileUpload').click()" class="chat-btn secondary">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M7.5 18A5.5 5.5 0 0 1 2 12.5A5.5 5.5 0 0 1 7.5 7H18A4 4 0 0 1 22 11A4 4 0 0 1 18 15H9.5A2.5 2.5 0 0 1 7 12.5A2.5 2.5 0 0 1 9.5 10H17V11.5H9.5A1 1 0 0 0 8.5 12.5A1 1 0 0 0 9.5 13.5H18A2.5 2.5 0 0 0 20.5 11A2.5 2.5 0 0 0 18 8.5H7.5A4 4 0 0 0 3.5 12.5A4 4 0 0 0 7.5 16.5H17V18H7.5Z"/>
                    </svg>
                </button>
                <button id="chatSendBtn" class="chat-send-btn">Send</button>
            </div>
            
            <div id="healthStatus" class="health-status"></div>
        </div>
    </div>
</template>
