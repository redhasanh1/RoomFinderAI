<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="theme-color" content="#667eea" />
  <title>RoomFinder AI - Login</title>

  <!-- Optional local auth helpers -->
  <script src="universal-auth-protection.js"></script>
  <script src="universal-auth-manager.js"></script>

  <!-- UI & SDKs -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <!-- Apple Sign-In -->
  <script src="https://appleid.cdn-apple.com/appleauth/static/jsapi/appleid/1/en_US/appleid.auth.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

  <!-- Optional site CSS -->
  <link rel="stylesheet" href="css/styles.css"/>
  <link rel="stylesheet" href="css/mobile-android.css"/>

  <style>
    html, body { overflow-x:hidden; max-width:100%; position:relative; font-family:Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; }

    .grand-bg{position:fixed; inset:0; background:linear-gradient(135deg,#667eea 0%,#764ba2 100%); z-index:-2;}
    .bg-pattern{position:fixed; inset:0; background-image:
      radial-gradient(circle at 20% 50%, rgba(255,255,255,.1) 0%, transparent 50%),
      radial-gradient(circle at 80% 80%, rgba(255,255,255,.05) 0%, transparent 50%),
      radial-gradient(circle at 40% 20%, rgba(255,255,255,.08) 0%, transparent 50%);
      z-index:-1;}
    .orb-container{position:fixed; inset:0; overflow:hidden; pointer-events:none; z-index:-1;}
    .orb{position:absolute; border-radius:50%; filter:blur(40px); opacity:.5; animation:float-orb 20s infinite ease-in-out; pointer-events:none; will-change:transform;}
    .orb-1{width:400px; height:400px; background:rgba(102,126,234,.3); top:-200px; right:-200px; transform:translate(50%,-50%);}
    .orb-2{width:300px; height:300px; background:rgba(118,75,162,.3); bottom:-150px; left:-150px; transform:translate(-50%,50%); animation-delay:-5s;}
    @keyframes float-orb{0%,100%{transform:scale(1)} 33%{transform:scale(1.1)} 66%{transform:scale(.9)}}
    @media (max-width:420px){ .orb{filter:blur(24px); opacity:.4;} }

    .auth-container-grand{
      background:rgba(255,255,255,.98);
      backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
      border:1px solid rgba(255,255,255,.3);
      border-radius:32px;
      box-shadow:0 30px 60px rgba(0,0,0,.1), 0 20px 40px rgba(102,126,234,.15), inset 0 1px 0 rgba(255,255,255,.5);
      position:relative; overflow:hidden;
      transition:all .4s cubic-bezier(.23,1,.32,1);
    }
    .auth-container-grand::before{
      content:""; position:absolute; top:0; left:0; right:0; height:1px;
      background:linear-gradient(90deg,transparent, rgba(102,126,234,.5), transparent);
      animation:shimmer 3s infinite;
    }
    @keyframes shimmer {0%{opacity:.4}50%{opacity:1}100%{opacity:.4}}

    /* Inputs & buttons (light “grand” style) */
    .input-grand{
      border:1px solid rgba(0,0,0,.08);
      background:#fff; height:48px; border-radius:14px; padding:0 14px;
      outline:none; box-shadow:inset 0 1px 0 rgba(255,255,255,.6);
      transition:border .2s, box-shadow .2s, transform .05s;
    }
    .input-grand:focus{ border-color:#7c83ff; box-shadow:0 0 0 4px rgba(124,131,255,.15); }
    .btn-grand{
      height:48px; border-radius:9999px; font-weight:700;
      background:linear-gradient(90deg,#6d74ff,#8b57e3);
      color:#fff; box-shadow:0 10px 20px rgba(109,116,255,.25); transition:transform .06s ease, box-shadow .2s;
    }
    .btn-grand:hover{ box-shadow:0 14px 26px rgba(109,116,255,.3); transform:translateY(-1px); }
    .btn-grand:active{ transform:translateY(0); }

    /* Social buttons: bulletproof layout-locked */
    .social-btn{
      background:#fff; border:2px solid rgba(102,126,234,.2);
      border-radius:9999px; font-weight:600; width:100%; aspect-ratio:6/2;
      display:inline-flex; align-items:center; justify-content:center; gap:8px;
      text-decoration:none; line-height:1;
      transition:background-color .15s, box-shadow .15s, transform .15s;
      will-change:transform;
    }
    .social-btn:hover{ 
      border-color:#7c83ff; 
      box-shadow:0 10px 25px rgba(102,126,234,.2); 
      transform:translateY(-2px); 
    }
    .social-btn:active{ transform:translateY(0); }
    
    /* Icon container: fixed size prevents layout shifts */
    .social-btn .icon{
      width:20px; height:20px; flex:0 0 20px;
      display:inline-block; line-height:0;
      pointer-events:none;
    }
    .social-btn .icon svg{ width:100%; height:100%; display:block; }
    .social-btn.google{background:#fff;}
    .social-btn.apple{background:#fff;}

    /* Don’t hide OAuth iframes. If you rendered the Google default button somewhere, you can hide its container: */
    .g_id_signin{ display:none !important; }

    @keyframes success-pulse {0%{transform:scale(0);opacity:0} 50%{transform:scale(1.2)} 100%{transform:scale(1);opacity:1}}
    .success-icon{ animation:success-pulse .5s ease-out; }
    .sr-only{ position:absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; border:0; }
  </style>
</head>
<body>
  <!-- Background -->
  <div class="grand-bg"></div>
  <div class="bg-pattern"></div>
  <div class="orb-container">
    <div class="orb orb-1"></div><div class="orb orb-2"></div>
  </div>

  <!-- Header -->
  <header class="fixed top-0 left-0 right-0 z-50 bg-white/10 backdrop-blur-lg border-b border-white/20">
    <div class="mx-auto px-4 py-4 flex items-center justify-between" style="max-width: 100%;">
      <a href="index.html" class="flex items-center text-white hover:text-purple-200 transition-colors text-lg font-semibold">
        <i class="fas fa-arrow-left mr-3 text-xl"></i><span class="text-lg">Back to Home</span>
      </a>
      <div id="authSection"></div>
    </div>
  </header>

  <!-- Main -->
  <div class="min-h-screen flex items-center justify-center px-4 py-12 pt-20">
    <div class="auth-container-grand w-full max-w-md p-8 sm:p-12">
      <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-20 h-20 bg-gradient-to-r from-purple-600 to-purple-800 rounded-2xl mb-4 shadow-lg">
          <i class="fas fa-home text-white text-3xl"></i>
        </div>
        <h1 class="text-3xl font-bold bg-gradient-to-r from-purple-600 to-purple-800 bg-clip-text text-transparent">RoomFinder AI</h1>
      </div>

      <!-- Auth Form -->
      <div id="authFormContainer">
        <h2 id="formTitle" class="text-2xl font-bold text-gray-800 mb-2 text-center">Welcome Back</h2>
        <p class="text-gray-600 text-center mb-8">Find your perfect room with AI</p>

        <form id="authForm" class="space-y-6" novalidate>
          <!-- Hidden name fields for registration -->
          <div id="nameFields" class="hidden space-y-4">
            <div>
              <label for="firstName" class="block text-sm font-semibold text-gray-700 mb-2">First Name</label>
              <input type="text" id="firstName" name="firstName" class="input-grand w-full" placeholder="John" autocomplete="given-name"/>
            </div>
            <div>
              <label for="lastName" class="block text-sm font-semibold text-gray-700 mb-2">Last Name</label>
              <input type="text" id="lastName" name="lastName" class="input-grand w-full" placeholder="Doe" autocomplete="family-name"/>
            </div>
          </div>

          <!-- Email -->
          <div>
            <label for="email" class="block text-sm font-semibold text-gray-700 mb-2">Email Address</label>
            <div class="relative">
              <input type="email" id="email" name="email" required class="input-grand w-full pl-12" placeholder="john@example.com" autocomplete="email" />
              <i class="fas fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-purple-400"></i>
            </div>
            <small id="email-help" class="sr-only">Use your email address.</small>
          </div>

          <!-- Password -->
          <div>
            <label for="password" class="block text-sm font-semibold text-gray-700 mb-2">Password</label>
            <div class="relative">
              <input type="password" id="password" name="password" required class="input-grand w-full pl-12" placeholder="••••••••" autocomplete="current-password" />
              <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-purple-400"></i>
            </div>
            <!-- Password Requirements (registration only) -->
            <div id="passwordRequirements" class="mt-2 p-3 bg-gray-50 border border-gray-200 rounded-lg shadow-sm" style="display:none;">
              <div id="req-length" class="flex items-center text-sm">
                <span id="length-icon" class="mr-2 text-red-500">✗</span>
                <span>At least 8 characters</span>
              </div>
            </div>
            <small id="password-help" class="sr-only">Enter your account password.</small>
          </div>

          <!-- Forgot password -->
          <div id="loginOptions" class="flex items-center justify-end">
            <a href="/forgot-password" class="text-sm text-purple-600 hover:text-purple-800 font-medium">Forgot password?</a>
          </div>

          <!-- Primary action -->
          <button type="submit" id="submitButton" class="btn-grand w-full mt-4">Sign In</button>

          <!-- Divider -->
          <div class="mt-6">
            <div class="relative">
              <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-gray-300"></div></div>
              <div class="relative flex justify-center text-sm"><span class="px-4 bg-white text-gray-500">Or</span></div>
            </div>
          </div>

          <!-- Social login -->
          <div class="mt-6">
            <div class="grid grid-cols-2 gap-4">
              <button type="button" id="googleSignInBtn" class="social-btn google" aria-label="Continue with Google">
                <span class="icon">
                  <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                  </svg>
                </span>
              </button>
              <button type="button" id="appleSignInBtn" class="social-btn apple" aria-label="Continue with Apple">
                <span class="icon">
                  <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z" fill="#000000"/>
                  </svg>
                </span>
              </button>
            </div>
          </div>

          <!-- Toggle -->
          <div class="text-center mt-8">
            <span class="text-gray-600">
              <span id="toggleText">Don't have an account?</span>
              <button type="button" id="toggleForm" class="text-purple-600 hover:text-purple-800 font-semibold ml-1">Register now</button>
            </span>
          </div>
        </form>
      </div>

      <!-- Email verification -->
      <div id="verificationSection" class="hidden">
        <div class="text-center mb-8">
          <div class="inline-flex items-center justify-center w-20 h-20 bg-gradient-to-r from-green-500 to-green-600 rounded-full mb-4 success-icon">
            <i class="fas fa-envelope-open-text text-white text-3xl"></i>
          </div>
          <h2 class="text-2xl font-bold text-gray-800 mb-2">Verify Your Email</h2>
          <p class="text-gray-600">We've sent a verification code to</p>
          <p id="verificationEmail" class="text-purple-600 font-semibold mt-1"></p>
        </div>

        <form id="verificationForm" class="space-y-6">
          <div>
            <label for="verificationCode" class="block text-sm font-semibold text-gray-700 mb-2 text-center">Enter 6-digit code</label>
            <input type="text" id="verificationCode" name="verificationCode" required class="input-grand w-full text-center text-2xl font-bold tracking-wider" placeholder="000000" maxlength="6" pattern="[0-9]{6}" style="letter-spacing: .5rem;" />
            <p class="text-sm text-gray-500 text-center mt-2">Code expires in 10 minutes</p>
          </div>
          <button type="submit" class="btn-grand w-full">Verify Email</button>
          <div class="text-center space-y-3">
            <button type="button" id="resendCode" class="text-purple-600 hover:text-purple-800 font-medium">Didn't receive code? Resend</button><br/>
            <button type="button" id="backToRegistration" class="text-gray-600 hover:text-gray-800"><i class="fas fa-arrow-left mr-2"></i>Back to registration</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script>
  document.addEventListener('DOMContentLoaded', () => {
    // Helpers
    function getDefaultProfileImage(){
      if (window.UniversalAuth && window.UniversalAuth.DEFAULT_PROFILE_IMAGE) return window.UniversalAuth.DEFAULT_PROFILE_IMAGE;
      return 'data:image/svg+xml;base64,'+btoa(`<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><rect width="100" height="100" rx="50" fill="#E5E7EB"/><path d="M50 45C56.075 45 61 40.075 61 34C61 27.925 56.075 23 50 23C43.925 23 39 27.925 39 34C39 40.075 43.925 45 50 45Z" fill="#9CA3AF"/><path d="M30 77C30 77 30 66.103 30 62C30 55.373 36.268 50 44 50H56C63.732 50 70 55.373 70 62C70 66.103 70 77 70 77" fill="#9CA3AF"/></svg>`);
    }
    const form = document.getElementById('authForm');
    const formTitle = document.getElementById('formTitle');
    const submitButton = document.getElementById('submitButton');
    const toggleForm = document.getElementById('toggleForm');
    const toggleText = document.getElementById('toggleText');
    const nameFields = document.getElementById('nameFields');
    const loginOptions = document.getElementById('loginOptions');
    const passwordRequirements = document.getElementById('passwordRequirements');
    const passwordInput = document.getElementById('password');
    let isLogin = true;

    function validatePassword(p){ return p.length >= 8; }
    function updatePasswordRequirements(isValid){
      const icon = document.getElementById('length-icon');
      if (!icon) return;
      if (isValid){ icon.textContent='✓'; icon.className='mr-2 text-green-500'; }
      else { icon.textContent='✗'; icon.className='mr-2 text-red-500'; }
    }

    if (passwordInput && passwordRequirements){
      passwordInput.addEventListener('focus', () => { if(!isLogin) passwordRequirements.style.display='block'; });
      passwordInput.addEventListener('blur', () => setTimeout(()=> passwordRequirements.style.display='none', 200));
      passwordInput.addEventListener('input', e => { if(!isLogin) updatePasswordRequirements(validatePassword(e.target.value)); });
    }

    toggleForm.addEventListener('click', () => {
      isLogin = !isLogin;
      formTitle.textContent = isLogin ? 'Welcome Back' : 'Create Account';
      submitButton.textContent = isLogin ? 'Sign In' : 'Create Account';
      toggleText.textContent = isLogin ? "Don't have an account?" : 'Already have an account?';
      toggleForm.textContent = isLogin ? 'Register now' : 'Sign in';
      nameFields.classList.toggle('hidden', isLogin);
      loginOptions.classList.toggle('hidden', !isLogin);
      if (isLogin) passwordRequirements.style.display='none';
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim().toLowerCase();
      const password = document.getElementById('password').value;

      if (isLogin){
        try{
          const r = await fetch('/api/login',{method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({email,password})});
          const result = await r.json();
          if (r.ok){
            // lightweight client cache (do not store secrets)
            let currentUser = null;
            try{
              const storedUser = localStorage.getItem('currentUser');
              if (storedUser){
                const parsed = JSON.parse(storedUser);
                if (parsed?.email?.toLowerCase() === email) currentUser = {...parsed, email};
              }
            }catch{}
            if (currentUser){
              localStorage.setItem('currentUser', JSON.stringify(currentUser));
              let users=[]; try{users=JSON.parse(localStorage.getItem('users'))||[];}catch{}
              const idx = users.findIndex(u=>u?.email?.toLowerCase()===email);
              if (idx>=0) users[idx]=currentUser; else users.push(currentUser);
              localStorage.setItem('users', JSON.stringify(users));
            }else{
              let users=[]; try{users=JSON.parse(localStorage.getItem('users'))||[];}catch{}
              const existing = users.find(u=>u?.email?.toLowerCase()===email);
              if (existing){ existing.email=email; localStorage.setItem('currentUser', JSON.stringify(existing)); }
              else{
                const newUser = { firstName:'User', lastName:'Name', email, profileImage:getDefaultProfileImage(), aiChats:[], listings:[], emailVerified:true };
                users.push(newUser);
                localStorage.setItem('users', JSON.stringify(users));
                localStorage.setItem('currentUser', JSON.stringify(newUser));
              }
            }
            window.location.href='verification-modal.html?redirect=index.html';
          }else{
            alert(result.error || 'Login failed');
          }
        }catch{
          alert('Login failed. Please try again.');
        }
      }else{
        const firstName = document.getElementById('firstName').value.trim();
        const lastName = document.getElementById('lastName').value.trim();
        if (!firstName || !lastName){ alert('Please fill in all fields.'); return; }
        if (!validatePassword(password)){ alert('Password must be at least 8 characters long.'); return; }

        try{
          submitButton.disabled=true; submitButton.innerHTML='<i class="fas fa-spinner fa-spin mr-2"></i>Sending...';
          const r = await fetch('/api/send-verification', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body:JSON.stringify({ firstName, lastName, email, password })
          });
          const result = await r.json();
          if (r.ok){
            showVerificationSection(email, { firstName, lastName, email, password });
          }else{
            alert(result.error || 'Failed to send verification email');
          }
        }catch{
          alert('Registration failed. Please try again.');
        }finally{
          submitButton.disabled=false; submitButton.textContent='Create Account';
        }
      }
    });

    // Verification
    let pendingUserData = null;
    function showVerificationSection(email, data){
      pendingUserData = data;
      document.getElementById('authFormContainer').classList.add('hidden');
      document.getElementById('verificationSection').classList.remove('hidden');
      document.getElementById('verificationEmail').textContent = email;
    }
    function hideVerificationSection(){
      document.getElementById('authFormContainer').classList.remove('hidden');
      document.getElementById('verificationSection').classList.add('hidden');
      pendingUserData = null;
    }
    const verificationForm = document.getElementById('verificationForm');
    verificationForm.addEventListener('submit', async (e)=>{
      e.preventDefault();
      if (!pendingUserData){ alert('No pending verification. Please try registering again.'); return; }
      const code = document.getElementById('verificationCode').value.trim();
      try{
        const r = await fetch('/api/verify-email',{method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ email: pendingUserData.email, code })});
        const result = await r.json();
        if (r.ok){
          const user = { firstName:pendingUserData.firstName, lastName:pendingUserData.lastName, email:pendingUserData.email, profileImage:getDefaultProfileImage(), aiChats:[], listings:[], emailVerified:true };
          let users=[]; try{users=JSON.parse(localStorage.getItem('users'))||[];}catch{}
          const idx = users.findIndex(u=>u?.email?.toLowerCase()===user.email.toLowerCase());
          if (idx>=0) users[idx]=user; else users.push(user);
          localStorage.setItem('users', JSON.stringify(users));
          localStorage.setItem('currentUser', JSON.stringify(user));
          alert('Email verified successfully! Welcome to RoomFinder AI.');
          window.location.href='verification-modal.html?redirect=index.html';
        }else{
          alert(result.error || 'Verification failed');
        }
      }catch{
        alert('Verification failed. Please try again.');
      }
    });
    document.getElementById('resendCode').addEventListener('click', async ()=>{
      if (!pendingUserData){ alert('No pending verification. Please try registering again.'); return; }
      try{
        const r = await fetch('/api/send-verification',{method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(pendingUserData)});
        const result = await r.json();
        if (r.ok){ alert('Verification code resent successfully!'); document.getElementById('verificationCode').value=''; }
        else{ alert(result.error || 'Failed to resend verification code'); }
      }catch{ alert('Failed to resend verification code. Please try again.'); }
    });
    document.getElementById('backToRegistration').addEventListener('click', hideVerificationSection);
    const verificationCode = document.getElementById('verificationCode');
    verificationCode.addEventListener('input', e=>{ e.target.value = e.target.value.replace(/[^0-9]/g, ''); });

    // Normalize stored emails (safety)
    (function normalizeStoredEmails(){
      try{
        let users = JSON.parse(localStorage.getItem('users'))||[];
        let updated=false;
        users = users.map(u => (u?.email && u.email!==u.email.toLowerCase()) ? (updated=true, {...u, email:u.email.toLowerCase()}) : u);
        if (updated) localStorage.setItem('users', JSON.stringify(users));
        const cu = localStorage.getItem('currentUser');
        if (cu){
          const obj = JSON.parse(cu);
          if (obj?.email && obj.email!==obj.email.toLowerCase()){
            obj.email = obj.email.toLowerCase();
            localStorage.setItem('currentUser', JSON.stringify(obj));
          }
        }
      }catch{}
    })();

    // Optional auth manager
    if (typeof window.UniversalAuth !== 'undefined'){
      window.UniversalAuth.init({ allowAnonymous:true, requireSupabase:false });
    }

    // ---- GOOGLE & APPLE SIGN-IN (robust) ----
    const googleBtn = document.getElementById('googleSignInBtn');
    const appleBtn = document.getElementById('appleSignInBtn');
    let oauthConfig = null;
    let googleInitialized = false;
    let codeClient = null; // Google OAuth code client fallback

    async function loadOAuthConfig(){
      if (oauthConfig) return oauthConfig;
      try{
        const r = await fetch('/api/config'); // { GOOGLE_OAUTH_CLIENT_ID, APPLE_CLIENT_ID }
        const cfg = await r.json();
        oauthConfig = { googleClientId: cfg.GOOGLE_OAUTH_CLIENT_ID, appleClientId: cfg.APPLE_CLIENT_ID };
      }catch(e){ console.error('Failed to load OAuth config', e); oauthConfig = {}; }
      return oauthConfig;
    }

    function initializeGoogleSignIn(){
      if (typeof google==='undefined' || googleInitialized || !oauthConfig?.googleClientId) return;
      // One-Tap / ID token
      google.accounts.id.initialize({
        client_id: oauthConfig.googleClientId,
        callback: handleGoogleIdToken,
        auto_select:false,
        cancel_on_tap_outside:true
      });
      // Popup OAuth (code exchange)
      // Try using postmessage as redirect_uri for popup mode
      console.log('Initializing Google OAuth popup mode');
      codeClient = google.accounts.oauth2.initCodeClient({
        client_id: oauthConfig.googleClientId,
        scope: 'openid email profile',
        redirect_uri: 'postmessage',
        ux_mode: 'popup',
        callback: handleGoogleAuthCode
      });
      googleInitialized = true;
    }

    // One-Tap ID token => backend verify
    async function handleGoogleIdToken(resp){
      try{
        const r = await fetch('/api/auth/google',{method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ idToken: resp.credential })});
        const result = await r.json();
        if (r.ok){
          localStorage.setItem('currentUser', JSON.stringify(result.user));
          const users = JSON.parse(localStorage.getItem('users')||'[]');
          const i = users.findIndex(u=>u?.email?.toLowerCase()===result.user.email?.toLowerCase());
          if (i>=0) users[i]=result.user; else users.push(result.user);
          localStorage.setItem('users', JSON.stringify(users));
          window.location.href='verification-modal.html?redirect=index.html';
        }else{
          alert(result.error || 'Google Sign-In failed');
        }
      }catch{ alert('Google Sign-In failed. Please try again.'); }
    }

    // Popup OAuth code => backend exchange
    async function handleGoogleAuthCode(resp){
      console.log('Google auth response:', resp);
      console.log('Authorization code received, length:', resp.code?.length);
      try{
        const r = await fetch('/api/auth/google/oauth-code',{method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ code: resp.code })});
        const result = await r.json();
        if (r.ok){
          localStorage.setItem('currentUser', JSON.stringify(result.user));
          const users = JSON.parse(localStorage.getItem('users')||'[]');
          const i = users.findIndex(u=>u?.email?.toLowerCase()===result.user.email?.toLowerCase());
          if (i>=0) users[i]=result.user; else users.push(result.user);
          localStorage.setItem('users', JSON.stringify(users));
          window.location.href='verification-modal.html?redirect=index.html';
        }else{
          console.error('OAuth code exchange failed:', result);
          alert(result.error || 'Google Sign-In failed');
        }
      }catch(e){ 
        console.error('OAuth code exchange error:', e);
        alert('Google Sign-In failed. Please try again.'); 
      }
    }

    async function handleGoogleSignIn(){
      if (!oauthConfig) await loadOAuthConfig();
      if (!googleInitialized) initializeGoogleSignIn();

      try{
        // Try One‑Tap first
        google.accounts.id.prompt((note)=>{
          const oneTapUnavailable = note.isNotDisplayed() || note.isSkippedMoment();
          if (oneTapUnavailable){
            // Fallback: guaranteed user-initiated popup
            if (codeClient) codeClient.requestCode();
            else alert('Google Sign-In unavailable. Try email/password.');
          }
        });
      }catch{
        if (codeClient) codeClient.requestCode();
        else alert('Google Sign-In unavailable. Try email/password.');
      }
    }

    async function handleAppleSignIn(){
      if (!oauthConfig) await loadOAuthConfig();
      
      // Check if Apple ID is available
      if (typeof AppleID === 'undefined'){ 
        console.error('Apple ID SDK not loaded');
        alert('Apple Sign-In is currently unavailable.'); 
        return; 
      }
      
      try{
        // Initialize Apple ID if not done and we have config
        if (!window.appleIdInitialized){
          // Check if we have a valid Apple client ID
          if (!oauthConfig?.appleClientId) {
            console.warn('No Apple Client ID configured');
            alert('Apple Sign-In is not configured yet. Please use email/password or Google Sign-In.');
            return;
          }
          
          console.log('Initializing Apple ID with client:', oauthConfig.appleClientId);
          
          AppleID.auth.init({
            clientId: oauthConfig.appleClientId,
            scope: 'name email',
            redirectURI: window.location.origin + '/login.html',
            state: 'roomfinder_auth',
            usePopup: true
          });
          window.appleIdInitialized = true;
        }
        
        console.log('Starting Apple Sign-In...');
        const response = await AppleID.auth.signIn();
        console.log('Apple Sign-In response:', response);
        
        // Send to backend - backend expects 'identityToken'
        const r = await fetch('/api/auth/apple',{
          method:'POST', 
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify({ 
            identityToken: response.authorization.id_token,
            authorizationCode: response.authorization.code,
            user: response.user 
          })
        });
        
        const result = await r.json();
        console.log('Backend response:', result);
        
        if (r.ok){
          localStorage.setItem('currentUser', JSON.stringify(result.user));
          const users = JSON.parse(localStorage.getItem('users')||'[]');
          const i = users.findIndex(u=>u?.email?.toLowerCase()===result.user.email?.toLowerCase());
          if (i>=0) users[i]=result.user; else users.push(result.user);
          localStorage.setItem('users', JSON.stringify(users));
          window.location.href='verification-modal.html?redirect=index.html';
        }else{
          console.error('Apple auth backend error:', result);
          alert(result.error || 'Apple Sign-In failed');
        }
      }catch(error){
        console.error('Apple Sign-In error:', error);
        
        // Handle specific Apple Sign-In errors
        if (error?.error === 'popup_closed_by_user') {
          console.log('User closed Apple Sign-In popup');
          return;
        }
        
        if (error?.error === 'popup_blocked_by_browser') {
          alert('Apple popup was blocked. Please allow popups and try again.');
          return;
        }
        
        // Handle common Apple authentication issues
        if (error?.message?.includes('invalid_client')) {
          alert('Apple Sign-In is not properly configured. Please use email/password or Google Sign-In.');
          return;
        }
        
        if (error?.message?.includes('invalid_request')) {
          alert('Apple Sign-In request failed. This service may not be properly set up for your domain.');
          return;
        }
        
        // Generic error
        console.error('Detailed Apple error:', error);
        alert('Apple Sign-In is currently unavailable. Please try:\n• Email/password login\n• Google Sign-In\n• Try again later');
      }
    }

    // Attach listeners
    googleBtn.addEventListener('click', handleGoogleSignIn);
    appleBtn.addEventListener('click', handleAppleSignIn);

    // Load OAuth config early
    loadOAuthConfig().then(()=> initializeGoogleSignIn());
  });
  </script>
</body>
