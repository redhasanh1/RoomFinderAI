<!-- Reusable Listing Card Component Template -->
<template id="listing-card-template">
    <div class="listing-card-perspective-container">
        <div class="listing-card p-6 cursor-pointer" data-listing-id="">
            <div class="relative mb-4">
                <img 
                    src="" 
                    alt="" 
                    class="listing-image w-full h-48 object-cover rounded-lg"
                />
                <div class="absolute top-2 right-2 bg-white bg-opacity-90 px-2 py-1 rounded-full text-sm font-semibold text-gray-700">
                    <span class="listing-price"></span>
                </div>
            </div>
            
            <h3 class="text-xl font-bold mb-2 text-gray-900 listing-title"></h3>
            
            <div class="flex items-center text-gray-600 mb-2">
                <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path>
                </svg>
                <span class="listing-location"></span>
            </div>
            
            <div class="text-sm text-gray-500 mb-3">
                <span class="inline-block bg-gray-100 px-2 py-1 rounded-full mr-2 listing-room-type"></span>
            </div>
            
            <p class="text-gray-600 mb-4 leading-relaxed listing-description"></p>
            
            <div class="listing-amenities flex flex-wrap gap-2 mb-4"></div>
            
            <div class="flex justify-between items-center">
                <span class="text-sm text-gray-500 listing-date"></span>
                <button class="view-details-btn bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-lg text-sm transition-colors">
                    View Details
                </button>
            </div>
        </div>
    </div>
</template>
