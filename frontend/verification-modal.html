<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Human Verification - RoomFinderAI</title>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .verification-modal {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            text-align: center;
            max-width: 480px;
            width: 90%;
            position: relative;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-header {
            margin-bottom: 30px;
        }

        .security-icon {
            width: 64px;
            height: 64px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: white;
        }

        .modal-title {
            font-size: 24px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 8px;
        }

        .modal-subtitle {
            font-size: 16px;
            color: #666;
            line-height: 1.5;
        }

        .verification-content {
            margin: 30px 0;
        }

        .turnstile-container {
            display: flex;
            justify-content: center;
            margin: 30px 0;
            min-height: 65px;
        }

        .continue-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            opacity: 0.5;
            pointer-events: none;
            width: 100%;
            margin-top: 20px;
        }

        .continue-button.enabled {
            opacity: 1;
            pointer-events: auto;
        }

        .continue-button.enabled:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.3);
        }

        .security-info {
            background: #f8fafc;
            border-radius: 8px;
            padding: 16px;
            margin-top: 20px;
            text-align: left;
        }

        .security-info-title {
            font-size: 14px;
            font-weight: 600;
            color: #374151;
            margin-bottom: 8px;
        }

        .security-info-text {
            font-size: 13px;
            color: #6b7280;
            line-height: 1.4;
        }

        .loading-spinner {
            display: none;
            width: 24px;
            height: 24px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-message {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #dc2626;
            padding: 12px;
            border-radius: 6px;
            font-size: 14px;
            margin-top: 15px;
            display: none;
        }

        @media (max-width: 480px) {
            .verification-modal {
                padding: 30px 20px;
                margin: 20px;
            }
            
            .modal-title {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="verification-modal">
        <div class="modal-header">
            <div class="security-icon">🛡️</div>
            <h1 class="modal-title">Security Verification</h1>
            <p class="modal-subtitle">Please verify that you're human to continue to RoomFinderAI</p>
        </div>

        <div class="verification-content">
            <div class="turnstile-container">
                <div id="turnstile-widget" class="cf-turnstile"></div>
            </div>
            
            <div class="loading-spinner" id="loading-spinner"></div>
            
            <button class="continue-button" id="continue-button" onclick="proceedToApp()">
                Continue to RoomFinderAI
            </button>
            
            <div class="error-message" id="error-message">
                Verification failed. Please try again.
            </div>
        </div>

        <div class="security-info">
            <div class="security-info-title">Why do we verify?</div>
            <div class="security-info-text">
                This security check helps protect RoomFinderAI from automated bots and ensures a safe experience for all users.
            </div>
        </div>
    </div>

    <script>
        let turnstileToken = null;
        let isVerified = false;

        // Callback when Turnstile verification succeeds
        function onTurnstileSuccess(token) {
            console.log('Turnstile verification successful');
            turnstileToken = token;
            isVerified = true;
            
            const continueButton = document.getElementById('continue-button');
            continueButton.classList.add('enabled');
            continueButton.textContent = 'Verification Complete - Continue';
            
            // Hide any error messages
            document.getElementById('error-message').style.display = 'none';
        }

        // Callback when Turnstile verification fails
        function onTurnstileError(errorCode) {
            console.error('Turnstile verification failed:', errorCode);
            isVerified = false;
            
            const continueButton = document.getElementById('continue-button');
            continueButton.classList.remove('enabled');
            continueButton.textContent = 'Verification Required';
            
            // Show error message
            const errorMsg = document.getElementById('error-message');
            errorMsg.style.display = 'block';
            errorMsg.textContent = 'Verification failed. Please try again.';
        }

        // Initialize Turnstile
        async function initializeTurnstile() {
            try {
                // Get site key from backend
                const response = await fetch('/api/turnstile-key');
                const data = await response.json();
                
                if (data.siteKey && window.turnstile) {
                    window.turnstile.render('#turnstile-widget', {
                        sitekey: data.siteKey,
                        callback: onTurnstileSuccess,
                        'error-callback': onTurnstileError,
                        theme: 'light',
                        size: 'normal'
                    });
                } else {
                    console.error('Failed to load Turnstile configuration');
                    // Fallback: allow access without verification
                    setTimeout(() => {
                        proceedToApp();
                    }, 2000);
                }
            } catch (error) {
                console.error('Error initializing Turnstile:', error);
                // Fallback: allow access without verification
                setTimeout(() => {
                    proceedToApp();
                }, 2000);
            }
        }

        // Proceed to the main application
        function proceedToApp() {
            if (!isVerified) {
                const errorMsg = document.getElementById('error-message');
                errorMsg.style.display = 'block';
                errorMsg.textContent = 'Please complete the security verification first.';
                return;
            }

            // Show loading state
            const continueButton = document.getElementById('continue-button');
            const loadingSpinner = document.getElementById('loading-spinner');
            
            continueButton.style.display = 'none';
            loadingSpinner.style.display = 'block';

            // Store verification token
            sessionStorage.setItem('turnstile_verified', 'true');
            sessionStorage.setItem('turnstile_token', turnstileToken);
            
            // Get the redirect URL from URL parameters or default to home
            const urlParams = new URLSearchParams(window.location.search);
            const redirectUrl = urlParams.get('redirect') || '/index.html';
            
            // Redirect after a short delay
            setTimeout(() => {
                window.location.href = redirectUrl;
            }, 1000);
        }

        // Initialize when page loads
        function waitForTurnstile() {
            if (window.turnstile && typeof window.turnstile.render === 'function') {
                initializeTurnstile();
            } else {
                setTimeout(waitForTurnstile, 100);
            }
        }

        // Start waiting for Turnstile to load
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', waitForTurnstile);
        } else {
            waitForTurnstile();
        }

        // Prevent closing the modal
        window.addEventListener('beforeunload', function(e) {
            if (!isVerified) {
                e.preventDefault();
                e.returnValue = '';
            }
        });
    </script>
</body>
</html>
