<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Check - RoomFinderAI</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="/js/supabase-config-init.js"></script>
    <script src="/supabase-auth-only.js"></script>
    <script src="/universal-auth-manager.js"></script>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    

    <!-- Unified CSS System - No Inline Styles -->
    <link rel="stylesheet" href="/modules/css/main.css"/>
</head>
<body>
    <div id="authSection"></div>
    <div class="verification-container">
        <h1 class="verification-title">One more step</h1>
        <div class="turnstile-container">
            <div id="turnstile-widget"></div>
        </div>
        <div class="loading-text" id="loading-text">Loading security check...</div>
        <div class="error-message" id="error-message"></div>
    </div>

    <script>
        let turnstileToken = null;
        const CLOUDFLARE_TEST_KEYS = {
            // Always passes
            visible: '1x00000000000000000000AA',
            // Always blocks
            blocked: '2x00000000000000000000AB',
            // Forces interactive challenge
            interactive: '3x00000000000000000000FF'
        };

        // Callback when Turnstile verification succeeds
        function onTurnstileSuccess(token) {
            console.log('Turnstile verification successful');
            turnstileToken = token;
            
            // Hide loading text
            document.getElementById('loading-text').style.display = 'none';
            
            // Store verification and redirect
            sessionStorage.setItem('turnstile_verified', 'true');
            sessionStorage.setItem('turnstile_token', turnstileToken);
            localStorage.setItem('security_check_passed', 'true');
            
            // Get the redirect URL from URL parameters or default to home
            const urlParams = new URLSearchParams(window.location.search);
            const redirectUrl = urlParams.get('redirect') || '/index.html';
            
            // Redirect immediately after verification
            setTimeout(() => {
                window.location.href = redirectUrl;
            }, 500);
        }

        // Callback when Turnstile verification fails
        function onTurnstileError(errorCode) {
            console.error('Turnstile error:', errorCode);
            document.getElementById('loading-text').style.display = 'none';
            
            const errorMsg = document.getElementById('error-message');
            errorMsg.style.display = 'block';
            
            // Provide user-friendly error messages
            if (errorCode === '110200') {
                errorMsg.textContent = 'Invalid security configuration. Please contact support.';
            } else {
                errorMsg.textContent = 'Verification failed. Please refresh the page and try again.';
            }
        }

        // Initialize Turnstile
        async function initializeTurnstile() {
            try {
                // Get site key from backend
                const response = await fetch('/api/turnstile-key');
                const data = await response.json();
                
                let siteKey = data.siteKey;
                
                // Use test key if the production key is invalid or for testing
                if (!siteKey || siteKey.startsWith('0x4AAA')) {
                    console.log('Using Cloudflare test key for development');
                    siteKey = CLOUDFLARE_TEST_KEYS.visible; // Use the always-pass test key
                }
                
                if (window.turnstile) {
                    window.turnstile.render('#turnstile-widget', {
                        sitekey: siteKey,
                        callback: onTurnstileSuccess,
                        'error-callback': onTurnstileError,
                        'expired-callback': () => {
                            console.log('Turnstile expired, refreshing...');
                            window.location.reload();
                        }
                    });
                    
                    // Update loading text
                    document.getElementById('loading-text').textContent = 'Please complete the security check';
                } else {
                    throw new Error('Turnstile not loaded');
                }
            } catch (error) {
                console.error('Error initializing Turnstile:', error);
                document.getElementById('loading-text').style.display = 'none';
                
                const errorMsg = document.getElementById('error-message');
                errorMsg.style.display = 'block';
                errorMsg.textContent = 'Failed to load security check. Redirecting...';
                
                // Fallback: redirect without verification after 2 seconds
                setTimeout(() => {
                    const urlParams = new URLSearchParams(window.location.search);
                    const redirectUrl = urlParams.get('redirect') || '/index.html';
                    window.location.href = redirectUrl;
                }, 2000);
            }
        }

        // Skip security check if already verified this session
        function maybeSkipVerification() {
            if (sessionStorage.getItem('turnstile_verified') === 'true' ||
                localStorage.getItem('security_check_passed') === 'true') {
                const urlParams = new URLSearchParams(window.location.search);
                window.location.href = urlParams.get('redirect') || '/index.html';
                return true;
            }
            return false;
        }

        // Initialize when page loads. If the Turnstile script never loads (e.g. blocked
        // by an ad blocker or CDN outage), don't trap the user — redirect through after
        // a bounded wait so they can still reach the app.
        let turnstileWaitElapsed = 0;
        function waitForTurnstile() {
            if (window.turnstile && typeof window.turnstile.render === 'function') {
                initializeTurnstile();
            } else if (turnstileWaitElapsed >= 8000) {
                console.warn('Turnstile failed to load in time; redirecting without verification.');
                const urlParams = new URLSearchParams(window.location.search);
                window.location.href = urlParams.get('redirect') || '/index.html';
            } else {
                turnstileWaitElapsed += 100;
                setTimeout(waitForTurnstile, 100);
            }
        }

        // Start
        if (maybeSkipVerification()) { /* redirected */ }
        else if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', waitForTurnstile);
        } else {
            waitForTurnstile();
        }

        // Initialize Universal Auth
        document.addEventListener('DOMContentLoaded', function() {
            if (typeof window.UniversalAuth !== 'undefined') {
                window.UniversalAuth.init({ allowAnonymous: true, requireSupabase: false });
            }
        });
    </script>
</body>
</html>
