<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#667eea">
    <title>RoomFinderAI Complete Test</title>
    <link rel="stylesheet" href="css/mobile-android.css">
    <script src="js/universal-compatibility.js"></script>
    <script src="js/environment-config.js"></script>
    <script src="js/mobile-init.js"></script>
    <script src="js/universal-auth-protection.js"></script>
    <script src="js/universal-auth-manager.js"></script>
    <style>
        body {
            font-family: 'Inter', Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: white;
        }
        .test-container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.37);
        }
        .test-section {
            margin: 20px 0;
            padding: 15px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            border-left: 4px solid #fff;
        }
        .test-result {
            margin: 10px 0;
            padding: 10px;
            border-radius: 5px;
            font-size: 14px;
        }
        .success { background: rgba(76, 175, 80, 0.3); border-left: 4px solid #4CAF50; }
        .error { background: rgba(244, 67, 54, 0.3); border-left: 4px solid #F44336; }
        .info { background: rgba(33, 150, 243, 0.3); border-left: 4px solid #2196F3; }
        .warning { background: rgba(255, 152, 0, 0.3); border-left: 4px solid #FF9800; }
        
        .btn {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            margin: 10px 5px;
            min-height: 48px;
            font-size: 16px;
        }
        .btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        
        .nav-test {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 20px 0;
        }
        
        @media (max-width: 768px) {
            .test-container {
                margin: 10px;
                padding: 15px;
            }
            .nav-test {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div id="authSection"></div>
    <div class="test-container">
        <h1>🚀 RoomFinderAI Complete Test Suite</h1>
        <p>This page tests all functionality across Web, Local, and Android environments.</p>
        
        <div class="test-section">
            <h2>🔍 Environment Detection</h2>
            <div id="environment-results"></div>
        </div>
        
        <div class="test-section">
            <h2>📱 Device & Platform Tests</h2>
            <div id="device-results"></div>
        </div>
        
        <div class="test-section">
            <h2>🌐 Network & API Tests</h2>
            <div id="network-results"></div>
            <button class="btn" onclick="testNetworkConnectivity()">Test Network</button>
            <button class="btn" onclick="testOfflineMode()">Test Offline Mode</button>
        </div>
        
        <div class="test-section">
            <h2>💾 Storage & Data Tests</h2>
            <div id="storage-results"></div>
            <button class="btn" onclick="testLocalStorage()">Test Storage</button>
        </div>
        
        <div class="test-section">
            <h2>🎨 UI & Responsive Tests</h2>
            <div id="ui-results"></div>
            <button class="btn" onclick="testTouchEvents()">Test Touch</button>
            <button class="btn" onclick="testResponsiveDesign()">Test Responsive</button>
        </div>
        
        <div class="test-section">
            <h2>🧭 Navigation Tests</h2>
            <div class="nav-test">
                <button class="btn" onclick="navigateToPage('index.html')">Home</button>
                <button class="btn" onclick="navigateToPage('login.html')">Login</button>
                <button class="btn" onclick="navigateToPage('signup.html')">Signup</button>
                <button class="btn" onclick="navigateToPage('dashboard.html')">Dashboard</button>
                <button class="btn" onclick="navigateToPage('listings.html')">Listings</button>
                <button class="btn" onclick="navigateToPage('ai-negotiator.html')">AI Chat</button>
            </div>
            <div id="navigation-results"></div>
        </div>
        
        <div class="test-section">
            <h2>⚡ Performance Tests</h2>
            <div id="performance-results"></div>
            <button class="btn" onclick="testPerformance()">Run Performance Test</button>
        </div>
        
        <div class="test-section">
            <h2>📊 Final Results</h2>
            <div id="final-results"></div>
            <button class="btn" onclick="runAllTests()" style="background: rgba(76, 175, 80, 0.3);">Run All Tests</button>
        </div>
    </div>

    <script>
        let testResults = {
            passed: 0,
            failed: 0,
            warnings: 0
        };

        function addResult(containerId, message, type = 'info') {
            const container = document.getElementById(containerId);
            const div = document.createElement('div');
            div.className = `test-result ${type}`;
            div.textContent = message;
            container.appendChild(div);
            
            if (type === 'success') testResults.passed++;
            else if (type === 'error') testResults.failed++;
            else if (type === 'warning') testResults.warnings++;
        }

        function clearResults(containerId) {
            document.getElementById(containerId).innerHTML = '';
        }

        // Environment Detection Tests
        function testEnvironmentDetection() {
            clearResults('environment-results');
            
            // Check if UniversalApp is loaded
            if (typeof window.UniversalApp !== 'undefined') {
                addResult('environment-results', '✓ Universal App loaded', 'success');
                addResult('environment-results', `Environment: ${window.UniversalApp.getEnvironment()}`, 'info');
                addResult('environment-results', `Android: ${window.UniversalApp.isAndroid}`, 'info');
                addResult('environment-results', `Local: ${window.UniversalApp.isLocal}`, 'info');
                addResult('environment-results', `Production: ${window.UniversalApp.isProduction}`, 'info');
            } else {
                addResult('environment-results', '✗ Universal App not loaded', 'error');
            }
            
            // Check if AppConfig is loaded
            if (typeof window.AppConfig !== 'undefined') {
                addResult('environment-results', '✓ App Config loaded', 'success');
                addResult('environment-results', `Mobile: ${window.AppConfig.isMobile}`, 'info');
            } else {
                addResult('environment-results', '✗ App Config not loaded', 'error');
            }
            
            // Check Capacitor
            if (window.Capacitor) {
                addResult('environment-results', '✓ Capacitor detected (Android App)', 'success');
            } else {
                addResult('environment-results', '✓ Web environment detected', 'success');
            }
        }

        // Device & Platform Tests
        function testDeviceAndPlatform() {
            clearResults('device-results');
            
            addResult('device-results', `User Agent: ${navigator.userAgent.substring(0, 50)}...`, 'info');
            addResult('device-results', `Screen: ${screen.width}x${screen.height}`, 'info');
            addResult('device-results', `Viewport: ${window.innerWidth}x${window.innerHeight}`, 'info');
            addResult('device-results', `Touch Support: ${('ontouchstart' in window) ? 'Yes' : 'No'}`, 'info');
            addResult('device-results', `Online: ${navigator.onLine ? 'Yes' : 'No'}`, navigator.onLine ? 'success' : 'warning');
            
            // Test mobile features
            if (window.DeviceMotionEvent) {
                addResult('device-results', '✓ Device Motion supported', 'success');
            }
            
            if (navigator.vibrate) {
                addResult('device-results', '✓ Vibration supported', 'success');
                navigator.vibrate(50);
            }
            
            if (navigator.share) {
                addResult('device-results', '✓ Web Share API supported', 'success');
            }
        }

        // Network Tests
        function testNetworkConnectivity() {
            clearResults('network-results');
            addResult('network-results', 'Testing network connectivity...', 'info');
            
            // Test fetch to current domain
            fetch(window.location.origin, { method: 'HEAD' })
                .then(response => {
                    if (response.ok) {
                        addResult('network-results', '✓ Network connectivity working', 'success');
                    } else {
                        addResult('network-results', '⚠ Network response not OK', 'warning');
                    }
                })
                .catch(error => {
                    addResult('network-results', '✗ Network connectivity failed', 'error');
                });
            
            // Test external resources
            const testResources = [
                'https://cdn.tailwindcss.com',
                'https://fonts.googleapis.com'
            ];
            
            testResources.forEach(url => {
                fetch(url, { mode: 'no-cors' })
                    .then(() => {
                        addResult('network-results', `✓ ${url} accessible`, 'success');
                    })
                    .catch(() => {
                        addResult('network-results', `✗ ${url} not accessible`, 'error');
                    });
            });
        }

        function testOfflineMode() {
            addResult('network-results', 'Simulating offline mode...', 'info');
            // Trigger offline event
            window.dispatchEvent(new Event('offline'));
            setTimeout(() => {
                window.dispatchEvent(new Event('online'));
                addResult('network-results', '✓ Offline/Online simulation completed', 'success');
            }, 2000);
        }

        // Storage Tests
        function testLocalStorage() {
            clearResults('storage-results');
            
            try {
                const testKey = 'roomfinder_test_' + Date.now();
                const testValue = JSON.stringify({ test: 'data', timestamp: Date.now() });
                
                localStorage.setItem(testKey, testValue);
                const retrieved = localStorage.getItem(testKey);
                localStorage.removeItem(testKey);
                
                if (retrieved === testValue) {
                    addResult('storage-results', '✓ localStorage working', 'success');
                } else {
                    addResult('storage-results', '✗ localStorage data mismatch', 'error');
                }
            } catch (e) {
                addResult('storage-results', '✗ localStorage not available', 'error');
            }
            
            // Test sessionStorage
            try {
                sessionStorage.setItem('test', 'value');
                sessionStorage.removeItem('test');
                addResult('storage-results', '✓ sessionStorage working', 'success');
            } catch (e) {
                addResult('storage-results', '✗ sessionStorage not available', 'error');
            }
            
            // Test IndexedDB
            if ('indexedDB' in window) {
                addResult('storage-results', '✓ IndexedDB available', 'success');
            } else {
                addResult('storage-results', '✗ IndexedDB not available', 'error');
            }
        }

        // UI Tests
        function testTouchEvents() {
            clearResults('ui-results');
            
            if ('ontouchstart' in window) {
                addResult('ui-results', '✓ Touch events supported', 'success');
            } else {
                addResult('ui-results', '⚠ Touch events not supported (desktop)', 'warning');
            }
            
            // Test button feedback
            const testBtn = document.createElement('button');
            testBtn.textContent = 'Touch Test';
            testBtn.className = 'btn';
            testBtn.style.margin = '10px 0';
            
            let touchWorking = false;
            testBtn.addEventListener('touchstart', () => touchWorking = true);
            testBtn.addEventListener('click', () => {
                if (touchWorking || !('ontouchstart' in window)) {
                    addResult('ui-results', '✓ Button touch/click working', 'success');
                } else {
                    addResult('ui-results', '⚠ Touch events may not be working', 'warning');
                }
                testBtn.remove();
            });
            
            document.getElementById('ui-results').appendChild(testBtn);
            addResult('ui-results', 'Click the test button above', 'info');
        }

        function testResponsiveDesign() {
            clearResults('ui-results');
            
            const width = window.innerWidth;
            const height = window.innerHeight;
            
            if (width <= 768) {
                addResult('ui-results', '✓ Mobile layout detected', 'success');
                // Check mobile nav
                const mobileNav = document.querySelector('.mobile-nav');
                if (mobileNav) {
                    addResult('ui-results', '✓ Mobile navigation present', 'success');
                } else {
                    addResult('ui-results', '⚠ Mobile navigation not found', 'warning');
                }
            } else {
                addResult('ui-results', '✓ Desktop layout detected', 'success');
            }
            
            // Test CSS media queries
            const testMediaQuery = window.matchMedia('(max-width: 768px)');
            addResult('ui-results', `Media query (mobile): ${testMediaQuery.matches}`, 'info');
            
            // Test viewport meta tag
            const viewport = document.querySelector('meta[name="viewport"]');
            if (viewport) {
                addResult('ui-results', '✓ Viewport meta tag present', 'success');
                addResult('ui-results', `Viewport content: ${viewport.getAttribute('content')}`, 'info');
            } else {
                addResult('ui-results', '✗ Viewport meta tag missing', 'error');
            }
        }

        // Navigation Tests
        function navigateToPage(page) {
            addResult('navigation-results', `Testing navigation to ${page}...`, 'info');
            
            // Check if page exists
            fetch(page, { method: 'HEAD' })
                .then(response => {
                    if (response.ok) {
                        addResult('navigation-results', `✓ ${page} exists and accessible`, 'success');
                        // Uncomment next line to actually navigate
                        // window.location.href = page;
                    } else {
                        addResult('navigation-results', `✗ ${page} not found (${response.status})`, 'error');
                    }
                })
                .catch(error => {
                    addResult('navigation-results', `✗ ${page} navigation failed`, 'error');
                });
        }

        // Performance Tests
        function testPerformance() {
            clearResults('performance-results');
            
            const startTime = performance.now();
            
            // Test DOM manipulation performance
            const testDiv = document.createElement('div');
            for (let i = 0; i < 1000; i++) {
                const span = document.createElement('span');
                span.textContent = 'test';
                testDiv.appendChild(span);
            }
            
            const domTime = performance.now() - startTime;
            addResult('performance-results', `DOM manipulation: ${domTime.toFixed(2)}ms`, 
                domTime < 50 ? 'success' : domTime < 100 ? 'warning' : 'error');
            
            // Test memory usage (if available)
            if (performance.memory) {
                const memory = performance.memory;
                addResult('performance-results', 
                    `Memory used: ${(memory.usedJSHeapSize / 1024 / 1024).toFixed(2)}MB`, 'info');
                addResult('performance-results', 
                    `Memory limit: ${(memory.jsHeapSizeLimit / 1024 / 1024).toFixed(2)}MB`, 'info');
            }
            
            // Test page load performance
            if (performance.timing) {
                const loadTime = performance.timing.loadEventEnd - performance.timing.navigationStart;
                addResult('performance-results', `Page load time: ${loadTime}ms`, 
                    loadTime < 2000 ? 'success' : loadTime < 5000 ? 'warning' : 'error');
            }
        }

        // Run All Tests
        function runAllTests() {
            clearResults('final-results');
            testResults = { passed: 0, failed: 0, warnings: 0 };
            
            addResult('final-results', 'Running comprehensive test suite...', 'info');
            
            testEnvironmentDetection();
            testDeviceAndPlatform();
            testNetworkConnectivity();
            testLocalStorage();
            testResponsiveDesign();
            testPerformance();
            
            setTimeout(() => {
                addResult('final-results', 
                    `Tests completed: ${testResults.passed} passed, ${testResults.failed} failed, ${testResults.warnings} warnings`, 
                    testResults.failed === 0 ? 'success' : 'warning');
                
                if (testResults.failed === 0 && testResults.warnings === 0) {
                    addResult('final-results', '🎉 All systems working perfectly!', 'success');
                } else if (testResults.failed === 0) {
                    addResult('final-results', '✅ System working with minor warnings', 'warning');
                } else {
                    addResult('final-results', '❌ Some issues detected, check individual tests', 'error');
                }
            }, 3000);
        }

        // Auto-run basic tests on load
        window.addEventListener('load', () => {
            setTimeout(() => {
                testEnvironmentDetection();
                testDeviceAndPlatform();
            }, 1000);
        });

        // Initialize Universal Auth
        document.addEventListener('DOMContentLoaded', function() {
            if (typeof UniversalAuth !== 'undefined') {
                UniversalAuth.init();
            }
        });
    </script>
</body>
</html>
