<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <title>Sublease Marketplace - RoomFinderAI</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="js/supabase-config-init.js"></script>
    <script src="universal-auth-manager.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/modules/css/main.css"/>
</head>
<body class="bg-gray-50 min-h-screen">
    <header class="fixed top-0 w-full premium-header z-50 bg-white shadow-md">
        <nav class="w-[90%] max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <a href="index.html" class="text-xl font-bold gradient-text">RoomFinderAI</a>
            <div class="hidden md:flex items-center gap-6 text-sm font-medium">
                <a href="listings.html" class="text-gray-600 hover:text-indigo-600">Listings</a>
                <a href="student-housing.html" class="text-gray-600 hover:text-indigo-600">Student Housing</a>
                <a href="legal.html" class="text-gray-600 hover:text-indigo-600">Legal</a>
                <a href="login.html" id="authLink" class="text-indigo-600">Login</a>
            </div>
        </nav>
    </header>

    <main class="pt-24 pb-16">
        <section class="bg-gradient-to-r from-indigo-600 to-purple-600 text-white py-14 px-4">
            <div class="max-w-5xl mx-auto text-center">
                <h1 class="text-4xl md:text-5xl font-bold mb-4">Sublease Marketplace</h1>
                <p class="text-lg text-white/90 max-w-2xl mx-auto">Transfer your lease or find a short-term sublet. Match with compatible tenants and room seekers.</p>
            </div>
        </section>

        <div class="max-w-6xl mx-auto px-4 mt-8">
            <div id="setupNotice" class="hidden mb-6 p-4 bg-amber-50 border border-amber-200 rounded-xl text-amber-900 text-sm"></div>
            <div id="statusBanner" class="hidden mb-6 p-4 rounded-xl text-sm"></div>

            <div class="flex flex-wrap gap-2 mb-8 border-b border-gray-200 pb-4">
                <button data-tab="post" class="tab-btn active px-5 py-2 rounded-lg font-medium bg-indigo-600 text-white">Post Request</button>
                <button data-tab="browse" class="tab-btn px-5 py-2 rounded-lg font-medium bg-gray-100 text-gray-700">Browse</button>
                <button data-tab="mine" class="tab-btn px-5 py-2 rounded-lg font-medium bg-gray-100 text-gray-700">My Requests</button>
            </div>

            <!-- Post (default) -->
            <section id="panel-post" class="tab-panel">
                <form id="postForm" class="bg-white rounded-2xl shadow p-8 space-y-5 max-w-3xl">
                    <div class="grid md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium mb-1">Request type *</label>
                            <select id="postType" required class="w-full border rounded-lg px-3 py-2">
                                <option value="transfer">I'm transferring my lease</option>
                                <option value="seeking">I'm seeking a sublet</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1">Property type</label>
                            <select id="postPropertyType" class="w-full border rounded-lg px-3 py-2">
                                <option value="apartment">Apartment</option>
                                <option value="house">House</option>
                                <option value="room">Room</option>
                                <option value="studio">Studio</option>
                                <option value="condo">Condo</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Title *</label>
                        <input id="postTitle" required class="w-full border rounded-lg px-3 py-2" placeholder="e.g. 1BR sublet near campus, May–Aug">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Description</label>
                        <textarea id="postDescription" rows="4" class="w-full border rounded-lg px-3 py-2"></textarea>
                    </div>
                    <div class="grid md:grid-cols-3 gap-4">
                        <input id="postCity" placeholder="City *" required class="border rounded-lg px-3 py-2">
                        <input id="postState" placeholder="State/Province" class="border rounded-lg px-3 py-2">
                        <input id="postZip" placeholder="ZIP/Postal" class="border rounded-lg px-3 py-2">
                    </div>
                    <div class="grid md:grid-cols-3 gap-4">
                        <input id="postRent" type="number" placeholder="Rent ($)" class="border rounded-lg px-3 py-2">
                        <input id="postBedrooms" type="number" min="0" placeholder="Bedrooms" class="border rounded-lg px-3 py-2">
                        <input id="postAvailableFrom" type="date" class="border rounded-lg px-3 py-2">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Photo (optional)</label>
                        <input id="postPhoto" type="file" accept="image/*" class="w-full border rounded-lg px-3 py-2 text-sm">
                    </div>
                    <button type="submit" class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 text-white py-3 rounded-xl font-semibold">Create Sublease Request</button>
                </form>
            </section>

            <!-- Browse -->
            <section id="panel-browse" class="tab-panel hidden">
                <div class="bg-white rounded-2xl shadow p-6 mb-6 grid md:grid-cols-4 gap-4">
                    <select id="filterType" class="border rounded-lg px-3 py-2">
                        <option value="">All types</option>
                        <option value="transfer">Transferring lease</option>
                        <option value="seeking">Seeking sublet</option>
                    </select>
                    <input id="filterCity" type="text" placeholder="City" class="border rounded-lg px-3 py-2">
                    <input id="filterState" type="text" placeholder="State/Province" class="border rounded-lg px-3 py-2">
                    <button id="searchBtn" class="bg-indigo-600 text-white rounded-lg py-2 font-medium hover:bg-indigo-700">Search</button>
                </div>
                <div id="browseResults" class="grid md:grid-cols-2 gap-4"></div>
            </section>

            <!-- My requests -->
            <section id="panel-mine" class="tab-panel hidden">
                <div id="myRequests" class="space-y-4"></div>
            </section>
        </div>
    </main>

    <script>
        let userEmail = null;

        function showBanner(type, text) {
            const el = document.getElementById('statusBanner');
            el.className = `mb-6 p-4 rounded-xl text-sm ${type === 'error' ? 'bg-red-50 text-red-800 border border-red-200' : 'bg-green-50 text-green-800 border border-green-200'}`;
            el.textContent = text;
            el.classList.remove('hidden');
        }

        function requireEmail() {
            if (userEmail) return userEmail;
            showBanner('error', 'Please log in to use sublease features.');
            setTimeout(() => { window.location.href = 'login.html?redirect=sublease.html'; }, 1200);
            throw new Error('Not logged in');
        }

        function switchTab(name) {
            document.querySelectorAll('.tab-panel').forEach((p) => p.classList.add('hidden'));
            document.getElementById(`panel-${name}`).classList.remove('hidden');
            document.querySelectorAll('.tab-btn').forEach((btn) => {
                const active = btn.dataset.tab === name;
                btn.className = `tab-btn px-5 py-2 rounded-lg font-medium ${active ? 'bg-indigo-600 text-white' : 'bg-gray-100 text-gray-700'}`;
            });
            if (name === 'mine') loadMyRequests();
            if (name === 'browse') searchSubleases();
        }

        function renderCards(requests, containerId, showActions = false) {
            const el = document.getElementById(containerId);
            if (!requests.length) {
                el.innerHTML = '<p class="text-gray-500 text-center py-12">No sublease requests found.</p>';
                return;
            }
            el.innerHTML = requests.map((r) => `
                <article class="bg-white rounded-xl shadow p-5 border border-gray-100">
                    <div class="flex justify-between items-start gap-2 mb-2">
                        <h3 class="font-semibold text-gray-900">${r.title}</h3>
                        <span class="text-xs px-2 py-1 rounded-full ${r.type === 'transfer' ? 'bg-blue-100 text-blue-800' : 'bg-green-100 text-green-800'}">${r.type}</span>
                    </div>
                    <p class="text-sm text-gray-600 mb-3 line-clamp-2">${r.description || 'No description'}</p>
                    <div class="text-sm text-gray-500 space-y-1">
                        <div>${[r.city, r.state].filter(Boolean).join(', ') || 'Location TBD'}</div>
                        ${r.rent_amount ? `<div>$${r.rent_amount}/mo</div>` : ''}
                        ${r.bedrooms != null ? `<div>${r.bedrooms} bed</div>` : ''}
                        <div class="text-xs">Status: ${r.status}</div>
                    </div>
                    ${showActions ? `<button onclick="deleteRequest('${r.id}')" class="mt-4 text-xs text-red-600 hover:underline">Cancel request</button>` : `<button onclick="expressInterest('${r.id}')" class="mt-4 text-xs bg-indigo-600 text-white px-3 py-2 rounded-lg">Express interest</button>`}
                </article>
            `).join('');
        }

        async function searchSubleases() {
            try {
                const params = new URLSearchParams();
                if (userEmail) params.set('userEmail', userEmail);
                const type = document.getElementById('filterType').value;
                const city = document.getElementById('filterCity').value.trim();
                const state = document.getElementById('filterState').value.trim();
                if (type) params.set('type', type);
                if (city) params.set('city', city);
                if (state) params.set('state', state);

                const res = await fetch(`/api/sublease/search?${params}`);
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || data.hint || 'Search failed');
                renderCards(data.requests || [], 'browseResults');
            } catch (err) {
                if (err.message === 'Not logged in') return;
                document.getElementById('browseResults').innerHTML = `<p class="text-red-600 text-center py-8">${err.message}</p>`;
                if (err.message.includes('table') || err.message.includes('Database')) {
                    document.getElementById('setupNotice').textContent = 'Admin: run database/migrations/simple_sublease_schema.sql in Supabase SQL Editor to enable sublease matching.';
                    document.getElementById('setupNotice').classList.remove('hidden');
                }
            }
        }

        async function loadMyRequests() {
            try {
                const email = requireEmail();
                const res = await fetch(`/api/sublease/requests?userEmail=${encodeURIComponent(email)}`);
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Failed to load requests');
                renderCards(data.requests || [], 'myRequests', true);
            } catch (err) {
                if (err.message === 'Not logged in') return;
                document.getElementById('myRequests').innerHTML = `<p class="text-red-600">${err.message}</p>`;
            }
        }

        async function deleteRequest(id) {
            if (!confirm('Cancel this sublease request?')) return;
            const email = requireEmail();
            const res = await fetch(`/api/sublease/requests/${id}?userEmail=${encodeURIComponent(email)}`, { method: 'DELETE' });
            const data = await res.json();
            if (!res.ok) { showBanner('error', data.error || 'Delete failed'); return; }
            showBanner('success', 'Request cancelled.');
            loadMyRequests();
        }

        async function expressInterest(requestId) {
            try {
                const email = requireEmail();
                const res = await fetch('/api/sublease/express-interest', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ requestId, userEmail: email })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Failed');
                showBanner('success', 'Interest sent! The poster will be notified when matching is enabled.');
            } catch (err) {
                if (err.message !== 'Not logged in') showBanner('error', err.message);
            }
        }

        document.getElementById('postForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            try {
                const email = requireEmail();
                const photoInput = document.getElementById('postPhoto');
                let photos = [];
                if (photoInput?.files?.[0]) {
                    const file = photoInput.files[0];
                    photos = [await new Promise((resolve, reject) => {
                        const reader = new FileReader();
                        reader.onload = () => resolve(reader.result);
                        reader.onerror = reject;
                        reader.readAsDataURL(file);
                    })];
                }
                const body = {
                    userEmail: email,
                    type: document.getElementById('postType').value,
                    title: document.getElementById('postTitle').value.trim(),
                    description: document.getElementById('postDescription').value.trim(),
                    city: document.getElementById('postCity').value.trim(),
                    state: document.getElementById('postState').value.trim(),
                    zipCode: document.getElementById('postZip').value.trim(),
                    propertyType: document.getElementById('postPropertyType').value,
                    rentAmount: document.getElementById('postRent').value ? Number(document.getElementById('postRent').value) : null,
                    bedrooms: document.getElementById('postBedrooms').value ? Number(document.getElementById('postBedrooms').value) : null,
                    availableFrom: document.getElementById('postAvailableFrom').value || null,
                    photos
                };
                const res = await fetch('/api/sublease/request', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.details || data.hint || data.error || 'Create failed');
                showBanner('success', 'Sublease request created.');
                e.target.reset();
                switchTab('mine');
            } catch (err) {
                if (err.message !== 'Not logged in') {
                    showBanner('error', err.message);
                    if (String(err.message).includes('table') || String(err.message).includes('Database')) {
                        document.getElementById('setupNotice').textContent = 'Admin: run database/migrations/simple_sublease_schema.sql in Supabase SQL Editor.';
                        document.getElementById('setupNotice').classList.remove('hidden');
                    }
                }
            }
        });

        document.querySelectorAll('.tab-btn').forEach((btn) => {
            btn.addEventListener('click', () => switchTab(btn.dataset.tab));
        });
        document.getElementById('searchBtn').addEventListener('click', searchSubleases);

        document.addEventListener('DOMContentLoaded', async () => {
            if (typeof UniversalAuth !== 'undefined') {
                UniversalAuth.init({ allowAnonymous: false, requireSupabase: true });
                const user = await UniversalAuth.getCurrentUser();
                if (user?.email) {
                    userEmail = user.email;
                    document.getElementById('authLink').textContent = 'Profile';
                    document.getElementById('authLink').href = 'profile.html';
                    searchSubleases();
                    return;
                }
            }
            // Not logged in — show a clear prompt instead of an empty Browse panel.
            document.getElementById('browseResults').innerHTML =
                '<div class="col-span-full text-center py-12 text-gray-500">'
                + '<p class="mb-4">Log in to browse and post sublease requests.</p>'
                + '<a href="login.html?redirect=sublease.html" class="inline-block bg-indigo-600 text-white px-6 py-2 rounded-lg font-medium hover:bg-indigo-700">Log in</a>'
                + '</div>';
        });
    </script>
</body>
</html>
